<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCAVENGER DASHBOARD</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #1a1c1c;
      --panel-bg: #151617;
      --text: #aaabac;
      --accent: #986c98;
      --secondary: #8ab6bb;
      --border: #3a3c3c;
      --danger: #FF5050;
      --cable: #d8a0d8;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* TOOLBAR (Top) */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: linear-gradient(180deg, #222425 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      user-select: none;
      z-index: 1000;
    }
    
    .btn {
      background: #252727;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 16px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
      border-radius: 4px;
    }
    
    .btn:hover { background: #2d2f30; border-color: var(--accent); color: var(--accent); }
    .btn:active { transform: translateY(1px); }
    .btn.active { border-color: var(--secondary); color: var(--secondary); background: rgba(138, 182, 187, 0.1); }
    .btn.danger:hover { border-color: var(--danger); color: var(--danger); }
    
    /* MAIN CANVAS / WORKSPACE */
    #canvas-container {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 20px;
      padding: 40px;
      box-sizing: border-box;
      overflow-y: auto;
      position: relative;
      z-index: 10;
    }
    
    #empty-placeholder {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #444;
      font-size: 14px;
      pointer-events: none;
      user-select: none;
    }
    
    /* STATUSBAR (Bottom) */
    #statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      background: var(--panel-bg);
      border-top: 1px solid var(--border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      user-select: none;
      z-index: 1000;
    }
    
    .status-left, .status-right { display: flex; align-items: center; gap: 24px; }
    .status-item { display: flex; align-items: center; gap: 6px; }
    .status-label { color: #666; }
    .status-value { color: var(--accent); font-weight: 500; }
    
    /* MODAL OVERLAY */
    .hidden { display: none !important; }
    
    #dialog-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    
    #dialog {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 450px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }
    
    #dialog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      user-select: none;
      color: var(--accent);
      font-weight: bold;
    }
    
    #dialog-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    /* SYSTEM MENU STYLES */
    .sys-cat-title { 
      margin: 0; padding: 5px 0 0; color: var(--accent); 
      text-transform: uppercase; font-size: 14px; cursor: pointer; 
      user-select: none; display: flex; justify-content: space-between; align-items: center;
    }
    .sys-cat-title::after { content: '▼'; font-size: 10px; opacity: 0.8; transition: transform 0.2s; }
    .sys-cat-title.collapsed::after { transform: rotate(-90deg); }
    .sys-cat-content { display: flex; flex-direction: column; gap: 5px; overflow: visible; }
    .sys-cat-content.collapsed { display: none; }
    
    .sys-row { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 0 8px; height: 32px; box-sizing: border-box; border-radius: 4px; transition: all 0.2s; margin: 0; 
    }
    .sys-row-hoverable { cursor: pointer; }
    .sys-row-hoverable:hover { background: rgba(255,255,255,0.05); }
    .sys-row-hoverable:hover .sys-row-lbl { color: var(--secondary); }
    .sys-row-lbl { transition: color 0.2s; pointer-events: none; font-size: 12px; }
    .sys-row-url { color: #666; font-size: 10px; pointer-events: none; transition: color 0.2s; }
    .sys-hr { width: 100%; border: 0; border-top: 1px solid var(--border); margin: 5px 0; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* WIRING UI & CABLES */
    #wire-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 100;
    }

    .cable-path {
      fill: none;
      stroke: var(--cable);
      stroke-width: 3px;
      stroke-linecap: round;
      opacity: 0.6;
      transition: stroke-width 0.2s, opacity 0.2s;
    }
    .cable-path.active {
      stroke: var(--secondary);
      stroke-width: 4px;
      opacity: 1;
      filter: drop-shadow(0 0 5px var(--secondary));
    }
    .cable-temp {
      stroke-dasharray: 6 6;
      stroke: var(--secondary);
      opacity: 0.8;
      animation: dash 1s linear infinite;
    }
    @keyframes dash { to { stroke-dashoffset: -12; } }

    #wiring-tooltip {
      display: none;
      position: fixed;
      background: var(--accent);
      color: var(--bg);
      padding: 2px 6px;
      font-size: 10px;
      font-weight: bold;
      pointer-events: none;
      z-index: 9999;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .panel-floating {
      position: fixed;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    #wiring-panel { width: 340px; }
    #disconnect-panel { width: 220px; }

    .wp-title { color: var(--accent); font-weight: bold; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px;}
    .wp-row { display: flex; gap: 10px; align-items: center; font-size: 12px; flex-wrap: wrap;}
    .wp-col { display: flex; flex-direction: column; gap: 6px; width: 100%; }
    .wp-input { flex: 1; background: #252727; color: var(--text); border: 1px solid var(--border); padding: 6px; font-family: inherit; font-size: 12px; outline: none; border-radius: 3px; width: 100%;}
    .wp-input:focus { border-color: var(--secondary); }
    
    label { cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 3px;}
    label:hover { background: rgba(255,255,255,0.05); }
    input[type="radio"] { accent-color: var(--secondary); }

    .node-label { font-weight: bold; color: var(--secondary); }
    
  </style>
</head>
<body>

  <div id="toolbar">
    <button class="btn" id="btn-sys" title="System Routes">
      <span>[ SYS ]</span>
    </button>
    <button class="btn" id="btn-mode" title="Toggle Wiring Mode">
      <span>[ VIEW MODE ]</span>
    </button>
    <button class="btn danger" id="btn-clear" title="Clear Workspace" style="margin-left: auto;">
      <span>[ CLEAR WORKSPACE ]</span>
    </button>
  </div>
  
  <div id="canvas-container">
    <div id="empty-placeholder">[ tools empty - ctrl+v to ingest ]</div>
  </div>
  
  <div id="statusbar">
    <div class="status-left">
      <div class="status-item">
        <span class="status-label">nodes</span>
        <span class="status-value" id="status-nodes">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">cables</span>
        <span class="status-value" id="status-wires">0</span>
      </div>
    </div>
    <div class="status-right">
      <div class="status-item">
        <span class="status-label">mode</span>
        <span class="status-value" id="status-mode">view</span>
      </div>
    </div>
  </div>

  <svg id="wire-canvas">
    <path id="temp-wire" class="cable-path cable-temp hidden" d="M0 0"></path>
  </svg>

  <div id="wiring-tooltip"></div>

  <div id="wiring-panel" class="panel-floating hidden">
    <div class="wp-title">Patch Nodes</div>
    
    <div class="wp-col" style="border-bottom: 1px solid #2a2c2c; padding-bottom: 10px;">
      <div style="color: #666;">Source Node: <span class="node-label" id="wp-src-lbl">button</span></div>
      <div class="wp-row">
        <label><input type="radio" name="w-src" value="sends" checked> SENDS (Data)</label>
        <label><input type="radio" name="w-src" value="trigger"> TRIGGER (Action)</label>
      </div>
    </div>

    <div class="wp-col" style="border-bottom: 1px solid #2a2c2c; padding-bottom: 10px;">
      <div style="color: #666;">Target Node: <span class="node-label" id="wp-tgt-lbl">div</span></div>
      <div class="wp-row">
        <label><input type="radio" name="w-tgt" value="receives" checked> RECEIVES (Data)</label>
        <label><input type="radio" name="w-tgt" value="action"> ACTION (Mutation)</label>
      </div>
      <div class="wp-row hidden" id="w-action-row" style="margin-top: 5px;">
        <select id="w-action-type" class="wp-input">
          <option value="clone">Clone Element</option>
          <option value="delete">Delete Element</option>
          <option value="toggle">Toggle Visibility</option>
          <option value="hide">Hide Element</option>
          <option value="show">Show Element</option>
        </select>
      </div>
    </div>
    
    <div class="wp-row" style="justify-content: space-between; margin-top: 5px;">
      <button class="btn" id="w-save" style="border-color: var(--secondary); color: var(--secondary); width: 60%;">PATCH CABLE</button>
      <button class="btn" id="w-cancel">CANCEL</button>
    </div>
  </div>

  <div id="disconnect-panel" class="panel-floating hidden">
    <div class="wp-title">Node Status</div>
    <div class="wp-row" style="color: #666; margin-bottom: 10px;">
      Connections: <span class="node-label" id="dp-conn-count">0</span>
    </div>
    <div class="wp-row" style="justify-content: space-between;">
      <button class="btn danger" id="dp-remove" style="width: 100%;">UNWIRE NODE</button>
    </div>
    <div class="wp-row" style="margin-top: 5px;">
        <button class="btn" id="dp-cancel" style="width: 100%;">CLOSE</button>
    </div>
  </div>

  <div id="dialog-overlay" class="hidden">
    <div id="dialog">
      <div id="dialog-header">
        <span>System Pathways</span>
        <button class="btn" id="dialog-close" style="padding: 4px 8px;">✕</button>
      </div>
      <div id="dialog-body" id="sys-menu-content"></div>
    </div>
  </div>

  <script>
    // --- STATE MANAGEMENT ---
    const STORE_COMPONENTS = 'mx_components'; 
    const STORE_WIRING = 'mx_wiring';
    
    let components = [];
    try {
        const parsed = JSON.parse(localStorage.getItem(STORE_COMPONENTS));
        if (parsed && Array.isArray(parsed) && typeof parsed[0] !== 'string') {
            components = parsed;
        } else if (parsed) {
            localStorage.removeItem(STORE_COMPONENTS);
        }
    } catch(e) {}

    let wiringRegistry = JSON.parse(localStorage.getItem(STORE_WIRING)) || {};
    
    let currentMode = 'view'; // 'view' | 'wiring'
    let activeReceivers = []; 
    let activeActions = [];

    const rxHub = new EventTarget();

    // --- SYSTEM MENU ---
    const systemRoutes = {
      "CORE & CONFIG": [
        { label: "Experiments Lab", url: "chrome://flags" },
        { label: "System Diagnostics", url: "chrome://system" },
        { label: "Version & CL Args", url: "chrome://version" },
        { label: "GPU Status", url: "chrome://gpu" }
      ],
      "STORAGE & STATE": [
        { label: "IndexedDB Inspector", url: "chrome://indexeddb-internals" },
        { label: "Service Workers", url: "chrome://serviceworker-internals" },
        { label: "Disk Quota & Usage", url: "chrome://quota-internals" }
      ],
      "PROTOCOLS": [
        { label: "Local File Explorer", url: "file:///" }
      ]
    };

    const dialogOverlay = document.getElementById('dialog-overlay');
    const dialogBody = document.getElementById('dialog-body');
    const canvasContainer = document.getElementById('canvas-container');
    const wireCanvas = document.getElementById('wire-canvas');
    const tempWire = document.getElementById('temp-wire');

    function buildSystemMenu() {
      dialogBody.innerHTML = '';
      Object.keys(systemRoutes).forEach(category => {
        let h4 = document.createElement('h4');
        h4.className = 'sys-cat-title collapsed';
        h4.textContent = category;
        dialogBody.appendChild(h4);

        let cWrap = document.createElement('div');
        cWrap.className = 'sys-cat-content collapsed';
        h4.onclick = () => { h4.classList.toggle('collapsed'); cWrap.classList.toggle('collapsed'); };

        systemRoutes[category].forEach(route => {
            let row = document.createElement('div');
            row.className = 'sys-row sys-row-hoverable';
            
            let lbl = document.createElement('span');
            lbl.className = 'sys-row-lbl';
            lbl.textContent = route.label;
            
            let urlLbl = document.createElement('span');
            urlLbl.className = 'sys-row-url';
            urlLbl.textContent = route.url;
            
            row.appendChild(lbl);
            row.appendChild(urlLbl);
            
            row.onclick = async () => {
                try { window.open(route.url, '_blank'); } catch(e) {}
                try {
                    await navigator.clipboard.writeText(route.url);
                    const originalText = urlLbl.textContent;
                    urlLbl.textContent = 'OPENING... (COPIED IF BLOCKED)';
                    urlLbl.style.color = 'var(--secondary)';
                    setTimeout(() => { urlLbl.textContent = originalText; urlLbl.style.color = ''; }, 1500);
                } catch (err) {}
            };
            cWrap.appendChild(row);
        });

        let hr = document.createElement('hr');
        hr.className = 'sys-hr';
        cWrap.appendChild(hr);
        dialogBody.appendChild(cWrap);
      });
    }

    document.getElementById('btn-sys').addEventListener('click', () => dialogOverlay.classList.remove('hidden'));
    document.getElementById('dialog-close').addEventListener('click', () => dialogOverlay.classList.add('hidden'));
    dialogOverlay.addEventListener('click', (e) => { if (e.target === dialogOverlay) dialogOverlay.classList.add('hidden'); });

    // --- UTILS ---
    function getSelector(el, root) {
        let path = [], cur = el;
        while (cur && cur.nodeType === 1 && cur !== root) {
            let name = cur.nodeName.toLowerCase();
            if (cur.id) { name += `#${cur.id}`; path.unshift(name); break; }
            let sibling = cur, nth = 1;
            while (sibling = sibling.previousElementSibling) { if (sibling.nodeName === cur.nodeName) nth++; }
            path.unshift(`${name}:nth-of-type(${nth})`);
            cur = cur.parentElement;
        }
        return path.join(' > ');
    }

    function generateId() {
        return 'ch_' + Math.random().toString(36).substr(2, 6);
    }

    function updateStatus() {
        const nodes = Array.from(canvasContainer.children).filter(c => c.tagName.toLowerCase().startsWith('scv-'));
        document.getElementById('status-nodes').textContent = nodes.length;
        
        let uniqueChannels = new Set();
        Object.values(wiringRegistry).forEach(nodeWires => {
            Object.values(nodeWires).forEach(w => uniqueChannels.add(w.channel));
        });
        document.getElementById('status-wires').textContent = uniqueChannels.size;
        
        document.getElementById('status-mode').textContent = currentMode;
        document.getElementById('status-mode').style.color = currentMode === 'wiring' ? 'var(--secondary)' : 'var(--accent)';
    }

    function autoSave() {
        const nodes = Array.from(canvasContainer.children).filter(c => c.tagName.toLowerCase().startsWith('scv-'));
        const stateToSave = [];
        
        nodes.forEach(node => {
            if(!node.shadowRoot) return;
            node.shadowRoot.querySelectorAll('input, textarea, select').forEach(el => {
                if(el.tagName === 'TEXTAREA') el.textContent = el.value;
                else el.setAttribute('value', el.value);
                
                if(el.type === 'checkbox' || el.type === 'radio') {
                    if(el.checked) el.setAttribute('checked', 'checked');
                    else el.removeAttribute('checked');
                }
            });
            
            const orig = components.find(c => c.tag === node.tagName.toLowerCase());
            if(orig) {
                stateToSave.push({ tag: orig.tag, script: orig.script, shadowHTML: node.shadowRoot.innerHTML });
            }
        });
        
        components = stateToSave;
        localStorage.setItem(STORE_COMPONENTS, JSON.stringify(components));
    }

    // --- PHASE 1: INGESTION & HYDRATION ---
    function initWorkspace() {
        if (components.length > 0) {
            document.getElementById('empty-placeholder').classList.add('hidden');
            components.forEach(comp => {
                const newScript = document.createElement('script');
                newScript.textContent = comp.script;
                document.body.appendChild(newScript);

                const el = document.createElement(comp.tag);
                canvasContainer.appendChild(el);

                setTimeout(() => {
                    if(el.shadowRoot) el.shadowRoot.innerHTML = comp.shadowHTML;
                    applyWiringEngine();
                    renderCables();
                }, 50);
            });
        }
        updateStatus();
    }

    document.addEventListener('paste', (e) => {
        if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        const text = (e.clipboardData || window.clipboardData).getData('text');
        if (text && text.includes('<scv-') && text.includes('customElements.define')) {
            e.preventDefault();
            
            const temp = document.createElement('div');
            temp.innerHTML = text;
            const el = temp.firstElementChild;
            const script = temp.querySelector('script');

            if (el && script) {
                const tag = el.tagName.toLowerCase();
                document.getElementById('empty-placeholder').classList.add('hidden');
                
                const newScript = document.createElement('script');
                newScript.textContent = script.textContent;
                document.body.appendChild(newScript);
                
                canvasContainer.appendChild(el);

                setTimeout(() => {
                    components.push({ tag: tag, script: script.textContent, shadowHTML: el.shadowRoot.innerHTML });
                    autoSave();
                    applyWiringEngine();
                    
                    if (currentMode === 'wiring' && el.shadowRoot) {
                        applyWiringState(el.shadowRoot, true);
                    }
                    updateStatus();
                }, 100);
            }
        }
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
        if(confirm("Destroy all nodes and wiring? This resets the visual database entirely.")) {
            components = [];
            wiringRegistry = {};
            localStorage.removeItem(STORE_COMPONENTS);
            localStorage.removeItem(STORE_WIRING);
            canvasContainer.innerHTML = '<div id="empty-placeholder">[ tools empty - ctrl+v to ingest ]</div>';
            renderCables();
            updateStatus();
        }
    });

    // --- PHASE 2: VISUAL PATCHING (DRAG & DROP) ---
    const btnMode = document.getElementById('btn-mode');
    const tooltip = document.getElementById('wiring-tooltip');
    const wPanel = document.getElementById('wiring-panel');
    const dPanel = document.getElementById('disconnect-panel');
    const wActionRow = document.getElementById('w-action-row');
    
    let dragStartNode = null; // { el, scvTag, selector, x, y }
    let dragEndNode = null;

    document.querySelectorAll('input[name="w-tgt"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            if(e.target.value === 'action') wActionRow.classList.remove('hidden');
            else wActionRow.classList.add('hidden');
        });
    });

    function toggleMode() {
        currentMode = currentMode === 'view' ? 'wiring' : 'view';
        btnMode.innerHTML = `<span>[ ${currentMode.toUpperCase()} MODE ]</span>`;
        
        if (currentMode === 'wiring') {
            btnMode.classList.add('active');
            renderCables();
            wireCanvas.classList.remove('hidden');
        } else {
            btnMode.classList.remove('active');
            wPanel.classList.add('hidden');
            dPanel.classList.add('hidden');
            wireCanvas.classList.add('hidden');
        }
        
        Array.from(canvasContainer.children).forEach(node => {
            if (node.tagName.toLowerCase().startsWith('scv-') && node.shadowRoot) {
                applyWiringState(node.shadowRoot, currentMode === 'wiring');
            }
        });
        updateStatus();
    }

    function applyWiringState(shadow, isWiring) {
        if (isWiring) {
            if (!shadow.getElementById('mx-wiring-style')) {
                const style = document.createElement('style');
                style.id = 'mx-wiring-style';
                style.textContent = `
                    .mx-wired-node { outline: 2px dashed var(--accent, #986c98) !important; outline-offset: -2px; cursor: crosshair !important; }
                    .mx-wired-node:hover { outline: 2px solid var(--secondary, #8ab6bb) !important; background: rgba(138, 182, 187, 0.15) !important; }
                `;
                shadow.appendChild(style);
            }
            const targets = shadow.querySelectorAll('button, input, textarea, select, h1, h2, h3, h4, p, img, a, span, tr, div');
            targets.forEach(t => t.classList.add('mx-wired-node'));
        } else {
            const style = shadow.getElementById('mx-wiring-style');
            if (style) style.remove();
            const targets = shadow.querySelectorAll('.mx-wired-node');
            targets.forEach(t => t.classList.remove('mx-wired-node'));
            tooltip.style.display = 'none';
        }
    }

    btnMode.addEventListener('click', toggleMode);

    // Cable Math
    function getBezier(x1, y1, x2, y2) {
        const dx = Math.abs(x2 - x1);
        const offset = Math.max(dx * 0.5, 50);
        return `M ${x1} ${y1} C ${x1 + offset} ${y1}, ${x2 - offset} ${y2}, ${x2} ${y2}`;
    }

    function getCenter(el) {
        const rect = el.getBoundingClientRect();
        return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    }

    function renderCables() {
        if (currentMode !== 'wiring') return;
        
        // Clear existing static cables
        Array.from(wireCanvas.querySelectorAll('.cable-static')).forEach(c => c.remove());

        // Map all registered selectors to actual DOM elements
        const channelMap = {}; // { ch_123: { sources: [], targets: [] } }
        
        const nodes = canvasContainer.children;
        for (let i = 0; i < nodes.length; i++) {
            const scvNode = nodes[i];
            const scvTag = scvNode.tagName.toLowerCase();
            if (!scvTag.startsWith('scv-') || !scvNode.shadowRoot) continue;
            
            const nodeWiring = wiringRegistry[scvTag];
            if (!nodeWiring) continue;
            
            Object.keys(nodeWiring).forEach(selector => {
                const config = nodeWiring[selector];
                const el = scvNode.shadowRoot.querySelector(selector);
                if(el) {
                    if(!channelMap[config.channel]) channelMap[config.channel] = { sources: [], targets: [] };
                    if(config.mode === 'sends' || config.mode === 'trigger') channelMap[config.channel].sources.push(el);
                    else channelMap[config.channel].targets.push(el);
                }
            });
        }

        // Draw paths for each channel
        Object.keys(channelMap).forEach(ch => {
            const group = channelMap[ch];
            group.sources.forEach(src => {
                const p1 = getCenter(src);
                group.targets.forEach(tgt => {
                    const p2 = getCenter(tgt);
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', getBezier(p1.x, p1.y, p2.x, p2.y));
                    path.setAttribute('class', 'cable-path cable-static');
                    wireCanvas.appendChild(path);
                });
            });
        });
    }

    // Keep cables attached during scroll
    canvasContainer.addEventListener('scroll', () => {
        if(currentMode === 'wiring') renderCables();
    });
    window.addEventListener('resize', () => {
        if(currentMode === 'wiring') renderCables();
    });

    // DRAG AND DROP EVENTS
    document.addEventListener('mousedown', (e) => {
        if (currentMode !== 'wiring') return;
        if(e.target.closest('.panel-floating') || e.target.closest('#toolbar') || e.target.closest('#statusbar')) return;

        // Close panels if clicking outside
        wPanel.classList.add('hidden');
        dPanel.classList.add('hidden');

        const path = e.composedPath();
        const target = path.find(el => el.classList && el.classList.contains('mx-wired-node'));
        
        if (target) {
            e.preventDefault(); e.stopPropagation();
            const scvNode = path.find(el => el.tagName && el.tagName.toLowerCase().startsWith('scv-'));
            if (!scvNode) return;
            
            const pt = getCenter(target);
            dragStartNode = { 
                el: target, 
                scvTag: scvNode.tagName.toLowerCase(), 
                selector: getSelector(target, scvNode.shadowRoot),
                x: pt.x, y: pt.y,
                isDrag: false
            };

            tempWire.classList.remove('hidden');
            tempWire.setAttribute('d', `M ${pt.x} ${pt.y} L ${e.clientX} ${e.clientY}`);
        }
    });

    document.addEventListener('mousemove', e => {
        if(currentMode !== 'wiring') return;
        
        if (dragStartNode) {
            dragStartNode.isDrag = true;
            tempWire.setAttribute('d', getBezier(dragStartNode.x, dragStartNode.y, e.clientX, e.clientY));
            tooltip.style.display = 'none';
        } else {
            const path = e.composedPath();
            const target = path.find(el => el.classList && el.classList.contains('mx-wired-node'));
            if (target && wPanel.classList.contains('hidden') && dPanel.classList.contains('hidden')) {
                tooltip.textContent = `<${target.tagName.toLowerCase()}>`;
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
            } else {
                tooltip.style.display = 'none';
            }
        }
    });

    document.addEventListener('mouseup', (e) => {
        if (currentMode !== 'wiring' || !dragStartNode) return;
        
        tempWire.classList.add('hidden');

        const path = e.composedPath();
        const target = path.find(el => el.classList && el.classList.contains('mx-wired-node'));

        if (!dragStartNode.isDrag) {
            // It was a simple click. Show Disconnect Panel if it has wires.
            const existing = wiringRegistry[dragStartNode.scvTag] && wiringRegistry[dragStartNode.scvTag][dragStartNode.selector];
            if (existing) {
                document.getElementById('dp-conn-count').textContent = '1 Active';
                dPanel.classList.remove('hidden');
                
                let pX = e.clientX + 15; let pY = e.clientY + 15;
                if (pX + 220 > window.innerWidth) pX = window.innerWidth - 230;
                dPanel.style.left = pX + 'px'; dPanel.style.top = pY + 'px';
            }
            dragStartNode = null;
            return;
        }

        // It was a drag. Check if dropped on valid target.
        if (target && target !== dragStartNode.el) {
            const scvNode = path.find(el => el.tagName && el.tagName.toLowerCase().startsWith('scv-'));
            if (scvNode) {
                dragEndNode = {
                    scvTag: scvNode.tagName.toLowerCase(),
                    selector: getSelector(target, scvNode.shadowRoot)
                };

                // Open Patching Panel
                document.getElementById('wp-src-lbl').textContent = `<${dragStartNode.el.tagName.toLowerCase()}>`;
                document.getElementById('wp-tgt-lbl').textContent = `<${target.tagName.toLowerCase()}>`;
                
                document.querySelector('input[name="w-src"][value="sends"]').checked = true;
                document.querySelector('input[name="w-tgt"][value="receives"]').checked = true;
                wActionRow.classList.add('hidden');

                wPanel.classList.remove('hidden');
                
                let pX = e.clientX + 15; let pY = e.clientY + 15;
                if (pX + 340 > window.innerWidth) pX = window.innerWidth - 350;
                if (pY + 250 > window.innerHeight) pY = window.innerHeight - 260;
                
                wPanel.style.left = pX + 'px';
                wPanel.style.top = pY + 'px';
            }
        }
        
        // Don't nullify dragStartNode yet, we need it for the Save button.
    });

    // Panel Actions
    document.getElementById('w-cancel').addEventListener('click', () => { wPanel.classList.add('hidden'); dragStartNode = null; dragEndNode = null; });
    document.getElementById('dp-cancel').addEventListener('click', () => { dPanel.classList.add('hidden'); dragStartNode = null; });
    
    document.getElementById('w-save').addEventListener('click', () => {
        if(!dragStartNode || !dragEndNode) return;
        
        const srcMode = document.querySelector('input[name="w-src"]:checked').value;
        const tgtMode = document.querySelector('input[name="w-tgt"]:checked').value;
        const actionType = document.getElementById('w-action-type').value;
        
        const channelId = generateId();

        // Register Source
        if(!wiringRegistry[dragStartNode.scvTag]) wiringRegistry[dragStartNode.scvTag] = {};
        wiringRegistry[dragStartNode.scvTag][dragStartNode.selector] = { mode: srcMode, channel: channelId, actionType: null };
        
        // Register Target
        if(!wiringRegistry[dragEndNode.scvTag]) wiringRegistry[dragEndNode.scvTag] = {};
        wiringRegistry[dragEndNode.scvTag][dragEndNode.selector] = { mode: tgtMode, channel: channelId, actionType: tgtMode === 'action' ? actionType : null };
        
        localStorage.setItem(STORE_WIRING, JSON.stringify(wiringRegistry));
        wPanel.classList.add('hidden');
        dragStartNode = null; dragEndNode = null;
        
        applyWiringEngine();
        renderCables();
        updateStatus();
    });

    document.getElementById('dp-remove').addEventListener('click', () => {
        if(!dragStartNode || !wiringRegistry[dragStartNode.scvTag]) return;
        
        const channelToKill = wiringRegistry[dragStartNode.scvTag][dragStartNode.selector].channel;
        delete wiringRegistry[dragStartNode.scvTag][dragStartNode.selector];
        
        // Optional: Clean up orphaned connections on the same channel
        Object.keys(wiringRegistry).forEach(tag => {
            Object.keys(wiringRegistry[tag]).forEach(sel => {
                if(wiringRegistry[tag][sel].channel === channelToKill) {
                    delete wiringRegistry[tag][sel];
                }
            });
        });

        localStorage.setItem(STORE_WIRING, JSON.stringify(wiringRegistry));
        dPanel.classList.add('hidden');
        dragStartNode = null;
        
        applyWiringEngine();
        renderCables();
        updateStatus();
    });


    // --- PHASE 3: THE REACTIVE RUNTIME ENGINE ---
    rxHub.addEventListener('mx-signal', (e) => {
        const { channel, value } = e.detail;
        
        activeReceivers.forEach(input => {
            if (input.channel === channel) {
                if (input.el.tagName === 'INPUT' || input.el.tagName === 'TEXTAREA') {
                    input.el.value = value;
                } else {
                    input.el.textContent = value;
                }
                const oldColor = input.el.style.color;
                input.el.style.color = 'var(--secondary)';
                setTimeout(() => input.el.style.color = oldColor, 200);
            }
        });
        autoSave();
    });

    rxHub.addEventListener('mx-trigger', (e) => {
        const { channel } = e.detail;
        
        activeActions.forEach(act => {
            if (act.channel === channel) {
                if (act.actionType === 'clone') {
                    const clone = act.el.cloneNode(true);
                    act.el.parentNode.insertBefore(clone, act.el.nextSibling);
                } else if (act.actionType === 'delete') {
                    act.el.remove();
                } else if (act.actionType === 'toggle') {
                    const currentDisplay = window.getComputedStyle(act.el).display;
                    if (currentDisplay !== 'none') {
                        act.el.dataset.mxOrigDisplay = currentDisplay;
                        act.el.style.display = 'none';
                    } else {
                        act.el.style.display = act.el.dataset.mxOrigDisplay || 'block';
                    }
                } else if (act.actionType === 'hide') {
                    act.el.dataset.mxOrigDisplay = window.getComputedStyle(act.el).display;
                    act.el.style.display = 'none';
                } else if (act.actionType === 'show') {
                    act.el.style.display = act.el.dataset.mxOrigDisplay || 'block';
                }
                
                if (act.actionType !== 'delete' && act.actionType !== 'hide') {
                    const oldBorder = act.el.style.border;
                    act.el.style.border = '1px solid var(--secondary)';
                    setTimeout(() => act.el.style.border = oldBorder, 200);
                }
            }
        });
        
        applyWiringEngine();
        autoSave();
    });

    function applyWiringEngine() {
        activeReceivers = []; 
        activeActions = [];
        const nodes = canvasContainer.children;
        
        for (let i = 0; i < nodes.length; i++) {
            const scvNode = nodes[i];
            const scvTag = scvNode.tagName.toLowerCase();
            
            if (!scvTag.startsWith('scv-') || !scvNode.shadowRoot) continue;
            
            const nodeWiring = wiringRegistry[scvTag];
            if (!nodeWiring) continue;
            
            const shadow = scvNode.shadowRoot;
            
            Object.keys(nodeWiring).forEach(selector => {
                const config = nodeWiring[selector];
                const targetElements = shadow.querySelectorAll(selector);
                
                targetElements.forEach(targetEl => {
                    if (config.mode === 'receives') {
                        activeReceivers.push({ el: targetEl, channel: config.channel });
                    } else if (config.mode === 'action') {
                        activeActions.push({ el: targetEl, channel: config.channel, actionType: config.actionType });
                    } 
                    
                    if (!targetEl.dataset.mxAttached) {
                        targetEl.dataset.mxAttached = "true";
                        
                        targetEl.addEventListener('click', (e) => {
                            if (currentMode === 'wiring') return;
                            const curConfig = wiringRegistry[scvTag] && wiringRegistry[scvTag][selector];
                            if (curConfig && curConfig.mode === 'trigger') {
                                e.preventDefault(); e.stopPropagation();
                                rxHub.dispatchEvent(new CustomEvent('mx-trigger', { detail: { channel: curConfig.channel } }));
                            }
                        });
                        
                        targetEl.addEventListener('input', (e) => {
                            if (currentMode === 'wiring') return;
                            const curConfig = wiringRegistry[scvTag] && wiringRegistry[scvTag][selector];
                            if (curConfig && curConfig.mode === 'sends') {
                                rxHub.dispatchEvent(new CustomEvent('mx-signal', { detail: { channel: curConfig.channel, value: e.target.value } }));
                            }
                        });
                        
                        targetEl.addEventListener('keyup', (e) => {
                            if (currentMode === 'wiring') return;
                            const curConfig = wiringRegistry[scvTag] && wiringRegistry[scvTag][selector];
                            if (curConfig && curConfig.mode === 'sends' && targetEl.tagName !== 'INPUT' && targetEl.tagName !== 'TEXTAREA') {
                                rxHub.dispatchEvent(new CustomEvent('mx-signal', { detail: { channel: curConfig.channel, value: targetEl.textContent } }));
                            }
                        });
                    }
                });
            });
        }
    }

    // Boot
    buildSystemMenu();
    initWorkspace();

  </script>
</body>
</html>
