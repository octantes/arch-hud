<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCAVENGER DASHBOARD</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #1a1c1c;
      --panel-bg: #151617;
      --text: #aaabac;
      --accent: #986c98;
      --secondary: #8ab6bb;
      --border: #3a3c3c;
      --danger: #FF5050;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* TOOLBAR (Top) */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: linear-gradient(180deg, #222425 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      user-select: none;
    }
    
    .btn {
      background: #252727;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 16px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
      border-radius: 4px;
    }
    
    .btn:hover { background: #2d2f30; border-color: var(--accent); color: var(--accent); }
    .btn:active { transform: translateY(1px); }
    .btn.active { border-color: var(--secondary); color: var(--secondary); background: rgba(138, 182, 187, 0.1); }
    .btn.danger:hover { border-color: var(--danger); color: var(--danger); }
    
    /* MAIN LAYOUT SPLIT */
    #main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* LEFT: CANVAS / WORKSPACE */
    #canvas-container {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 20px;
      padding: 40px;
      box-sizing: border-box;
      overflow-y: auto;
      position: relative;
      border-right: 1px solid var(--border);
    }
    
    #empty-placeholder {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #444;
      font-size: 14px;
      pointer-events: none;
      user-select: none;
    }

    /* RIGHT: DATA LAYER (DATABASE) */
    #data-container {
      width: 350px;
      background: var(--panel-bg);
      display: flex;
      flex-direction: column;
    }

    .data-header {
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: bold;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #notes-list {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .mx-note {
      background: #1e2020;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .mx-note-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .mx-note-date { font-size: 9px; color: #666; }
    .mx-note-del { cursor: pointer; color: #666; font-size: 12px; border: none; background: none; transition: color 0.2s; }
    .mx-note-del:hover { color: var(--danger); }
    .mx-note-body { font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.4; }
    
    /* STATUSBAR (Bottom) */
    #statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      background: var(--panel-bg);
      border-top: 1px solid var(--border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      user-select: none;
    }
    
    .status-left, .status-right { display: flex; align-items: center; gap: 24px; }
    .status-item { display: flex; align-items: center; gap: 6px; }
    .status-label { color: #666; }
    .status-value { color: var(--accent); font-weight: 500; }
    
    /* MODAL OVERLAY */
    .hidden { display: none !important; }
    
    #dialog-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    #dialog {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 450px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }
    
    #dialog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      user-select: none;
      color: var(--accent);
      font-weight: bold;
    }
    
    #dialog-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    /* SYSTEM MENU STYLES */
    .sys-cat-title { 
      margin: 0; padding: 5px 0 0; color: var(--accent); 
      text-transform: uppercase; font-size: 14px; cursor: pointer; 
      user-select: none; display: flex; justify-content: space-between; align-items: center;
    }
    .sys-cat-title::after { content: '▼'; font-size: 10px; opacity: 0.8; transition: transform 0.2s; }
    .sys-cat-title.collapsed::after { transform: rotate(-90deg); }
    .sys-cat-content { display: flex; flex-direction: column; gap: 5px; overflow: visible; }
    .sys-cat-content.collapsed { display: none; }
    
    .sys-row { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 0 8px; height: 32px; box-sizing: border-box; border-radius: 4px; transition: all 0.2s; margin: 0; 
    }
    .sys-row-hoverable { cursor: pointer; }
    .sys-row-hoverable:hover { background: rgba(255,255,255,0.05); }
    .sys-row-hoverable:hover .sys-row-lbl { color: var(--secondary); }
    .sys-row-lbl { transition: color 0.2s; pointer-events: none; font-size: 12px; }
    .sys-row-url { color: #666; font-size: 10px; pointer-events: none; transition: color 0.2s; }
    .sys-hr { width: 100%; border: 0; border-top: 1px solid var(--border); margin: 5px 0; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* WIRING UI */
    #wiring-tooltip {
      display: none;
      position: fixed;
      background: var(--accent);
      color: var(--bg);
      padding: 2px 6px;
      font-size: 10px;
      font-weight: bold;
      pointer-events: none;
      z-index: 9999;
      border-radius: 3px;
      text-transform: uppercase;
    }

    #wiring-panel {
      position: fixed;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      width: 290px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .wp-title { color: var(--accent); font-weight: bold; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px;}
    .wp-row { display: flex; gap: 10px; align-items: center; font-size: 12px;}
    .wp-input { flex: 1; background: #252727; color: var(--text); border: 1px solid var(--border); padding: 6px; font-family: inherit; font-size: 12px; outline: none; border-radius: 3px;}
    .wp-input:focus { border-color: var(--secondary); }
    .wp-hint { font-size: 9px; color: #666; font-style: italic; }
    
    label { cursor: pointer; display: flex; align-items: center; gap: 4px;}
    input[type="radio"] { accent-color: var(--secondary); }
    
  </style>
</head>
<body>

  <div id="toolbar">
    <button class="btn" id="btn-sys" title="System Routes">
      <span>[ SYS ]</span>
    </button>
    <button class="btn" id="btn-mode" title="Toggle Wiring Mode">
      <span>[ VIEW MODE ]</span>
    </button>
    <button class="btn danger" id="btn-clear" title="Clear Canvas" style="margin-left: auto;">
      <span>[ CLEAR TOOLS ]</span>
    </button>
  </div>
  
  <div id="main-layout">
    <div id="canvas-container">
      <div id="empty-placeholder">[ tools empty - ctrl+v to ingest ]</div>
    </div>

    <div id="data-container">
      <div class="data-header">
        <span>SCAVENGER.DB</span>
        <button class="mx-note-del" id="btn-clear-db" title="Delete all notes">🗑</button>
      </div>
      <div id="notes-list">
        </div>
    </div>
  </div>
  
  <div id="statusbar">
    <div class="status-left">
      <div class="status-item">
        <span class="status-label">nodes</span>
        <span class="status-value" id="status-nodes">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">wires</span>
        <span class="status-value" id="status-wires">0</span>
      </div>
      <div class="status-item" style="margin-left: 15px;">
        <span class="status-label">records</span>
        <span class="status-value" id="status-db">0</span>
      </div>
    </div>
    <div class="status-right">
      <div class="status-item">
        <span class="status-label">mode</span>
        <span class="status-value" id="status-mode">view</span>
      </div>
    </div>
  </div>

  <div id="wiring-tooltip"></div>

  <div id="wiring-panel" class="hidden">
    <div class="wp-title">Node Linker</div>
    <div class="wp-row">
      <label><input type="radio" name="w-type" value="output"> OUTPUT</label>
      <label><input type="radio" name="w-type" value="input"> INPUT</label>
    </div>
    <div class="wp-row" style="flex-direction: column; align-items: stretch; gap: 4px;">
      <input type="text" class="wp-input" id="w-channel" placeholder="channel-name">
      <span class="wp-hint">System Channels: nota-body, $sys:add-note</span>
    </div>
    <div class="wp-row" style="justify-content: space-between; margin-top: 5px;">
      <button class="btn" id="w-save" style="border-color: var(--secondary); color: var(--secondary);">LINK</button>
      <button class="btn danger" id="w-remove">UNWIRE</button>
      <button class="btn" id="w-cancel">CANCEL</button>
    </div>
  </div>

  <div id="dialog-overlay" class="hidden">
    <div id="dialog">
      <div id="dialog-header">
        <span>System Pathways</span>
        <button class="btn" id="dialog-close" style="padding: 4px 8px;">✕</button>
      </div>
      <div id="dialog-body" id="sys-menu-content"></div>
    </div>
  </div>

  <script>
    // --- STATE MANAGEMENT ---
    const STORE_COMPONENTS = 'mx_components';
    const STORE_WIRING = 'mx_wiring';
    const STORE_DB = 'mx_database';
    
    let components = JSON.parse(localStorage.getItem(STORE_COMPONENTS)) || [];
    let wiringRegistry = JSON.parse(localStorage.getItem(STORE_WIRING)) || {};
    let dbRecords = JSON.parse(localStorage.getItem(STORE_DB)) || [];
    
    let currentMode = 'view'; // 'view' | 'wiring'
    let activeInputs = []; // Stores { el: DOMNode, channel: string }
    let globalChannelState = {}; // Live RAM of the framework

    // Event Bus for Dashboard Reactivity
    const rxHub = new EventTarget();

    // --- SYSTEM MENU ---
    const systemRoutes = {
      "CORE & CONFIG": [
        { label: "Experiments Lab", url: "chrome://flags" },
        { label: "System Diagnostics", url: "chrome://system" },
        { label: "Version & CL Args", url: "chrome://version" },
        { label: "Internal Components", url: "chrome://components" },
        { label: "GPU Status", url: "chrome://gpu" }
      ],
      "STORAGE & STATE": [
        { label: "IndexedDB Inspector", url: "chrome://indexeddb-internals" },
        { label: "Service Workers", url: "chrome://serviceworker-internals" },
        { label: "Disk Quota & Usage", url: "chrome://quota-internals" },
        { label: "Memory Blobs", url: "chrome://blob-internals" }
      ],
      "DEBUGGING & NETWORK": [
        { label: "Target Inspector", url: "chrome://inspect" },
        { label: "Network Logs", url: "chrome://net-internals" },
        { label: "Deep Profiler (Trace)", url: "chrome://tracing" },
        { label: "WebRTC Connections", url: "chrome://webrtc-internals" }
      ],
      "HARDWARE APIS": [
        { label: "USB Devices", url: "chrome://usb-internals" },
        { label: "Bluetooth Scanner", url: "chrome://bluetooth-internals" },
        { label: "Device Event Log", url: "chrome://device-log" }
      ],
      "PROTOCOLS": [
        { label: "Local File Explorer", url: "file:///" }
      ]
    };

    const dialogOverlay = document.getElementById('dialog-overlay');
    const dialogBody = document.getElementById('dialog-body');
    const canvasContainer = document.getElementById('canvas-container');

    function buildSystemMenu() {
      dialogBody.innerHTML = '';
      Object.keys(systemRoutes).forEach(category => {
        let h4 = document.createElement('h4');
        h4.className = 'sys-cat-title collapsed';
        h4.textContent = category;
        dialogBody.appendChild(h4);

        let cWrap = document.createElement('div');
        cWrap.className = 'sys-cat-content collapsed';
        
        h4.onclick = () => {
            h4.classList.toggle('collapsed');
            cWrap.classList.toggle('collapsed');
        };

        systemRoutes[category].forEach(route => {
            let row = document.createElement('div');
            row.className = 'sys-row sys-row-hoverable';
            
            let lbl = document.createElement('span');
            lbl.className = 'sys-row-lbl';
            lbl.textContent = route.label;
            
            let urlLbl = document.createElement('span');
            urlLbl.className = 'sys-row-url';
            urlLbl.textContent = route.url;
            
            row.appendChild(lbl);
            row.appendChild(urlLbl);
            
            row.onclick = async () => {
                try { window.open(route.url, '_blank'); } catch(e) {}
                try {
                    await navigator.clipboard.writeText(route.url);
                    const originalText = urlLbl.textContent;
                    urlLbl.textContent = 'OPENING... (COPIED IF BLOCKED)';
                    urlLbl.style.color = 'var(--secondary)';
                    setTimeout(() => {
                        urlLbl.textContent = originalText;
                        urlLbl.style.color = '';
                    }, 1500);
                } catch (err) {}
            };
            cWrap.appendChild(row);
        });

        let hr = document.createElement('hr');
        hr.className = 'sys-hr';
        cWrap.appendChild(hr);
        dialogBody.appendChild(cWrap);
      });
    }

    document.getElementById('btn-sys').addEventListener('click', () => dialogOverlay.classList.remove('hidden'));
    document.getElementById('dialog-close').addEventListener('click', () => dialogOverlay.classList.add('hidden'));
    dialogOverlay.addEventListener('click', (e) => { if (e.target === dialogOverlay) dialogOverlay.classList.add('hidden'); });

    // --- UTILS ---
    function getSelector(el, root) {
        let path = [], cur = el;
        while (cur && cur.nodeType === 1 && cur !== root) {
            let name = cur.nodeName.toLowerCase();
            if (cur.id) { name += `#${cur.id}`; path.unshift(name); break; }
            let sibling = cur, nth = 1;
            while (sibling = sibling.previousElementSibling) { if (sibling.nodeName === cur.nodeName) nth++; }
            path.unshift(`${name}:nth-of-type(${nth})`);
            cur = cur.parentElement;
        }
        return path.join(' > ');
    }

    function updateStatus() {
        const nodes = Array.from(canvasContainer.children).filter(c => c.tagName.toLowerCase().startsWith('scv-'));
        document.getElementById('status-nodes').textContent = nodes.length;
        
        let wires = 0;
        Object.values(wiringRegistry).forEach(nodeWires => wires += Object.keys(nodeWires).length);
        document.getElementById('status-wires').textContent = wires;
        document.getElementById('status-db').textContent = dbRecords.length;
        
        document.getElementById('status-mode').textContent = currentMode;
        document.getElementById('status-mode').style.color = currentMode === 'wiring' ? 'var(--secondary)' : 'var(--accent)';
    }

    // --- PHASE 1: INGESTION & PERSISTENCE ---
    function initWorkspace() {
        if (components.length > 0) {
            document.getElementById('empty-placeholder').classList.add('hidden');
            components.forEach(compText => injectToCanvas(compText, false));
        }
        renderDatabase();
        updateStatus();
    }

    function injectToCanvas(htmlText, saveToStorage = true) {
        if (saveToStorage) {
            components.push(htmlText);
            localStorage.setItem(STORE_COMPONENTS, JSON.stringify(components));
            document.getElementById('empty-placeholder').classList.add('hidden');
        }

        const temp = document.createElement('div');
        temp.innerHTML = htmlText;
        const el = temp.firstElementChild;
        const script = temp.querySelector('script');

        if (el && script) {
            canvasContainer.appendChild(el);
            const newScript = document.createElement('script');
            newScript.textContent = script.textContent;
            document.body.appendChild(newScript);

            setTimeout(() => {
                applyWiringEngine(); 
                if (currentMode === 'wiring' && el.shadowRoot) {
                    applyWiringState(el.shadowRoot, true);
                }
                updateStatus();
            }, 100);
        }
    }

    document.addEventListener('paste', (e) => {
        // Ignore paste if typing in an input
        if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        const text = (e.clipboardData || window.clipboardData).getData('text');
        if (text && text.includes('<scv-') && text.includes('customElements.define')) {
            e.preventDefault();
            injectToCanvas(text, true);
        }
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
        if(confirm("Destroy all nodes and wiring? Database will be kept.")) {
            components = [];
            wiringRegistry = {};
            localStorage.removeItem(STORE_COMPONENTS);
            localStorage.removeItem(STORE_WIRING);
            canvasContainer.innerHTML = '<div id="empty-placeholder">[ tools empty - ctrl+v to ingest ]</div>';
            updateStatus();
        }
    });

    document.getElementById('btn-clear-db').addEventListener('click', () => {
        if(confirm("Delete all notes? This cannot be undone.")) {
            dbRecords = [];
            localStorage.removeItem(STORE_DB);
            renderDatabase();
            updateStatus();
        }
    });

    // --- PHASE 2: SCANNER AND WIRING UI ---
    const btnMode = document.getElementById('btn-mode');
    const tooltip = document.getElementById('wiring-tooltip');
    const wPanel = document.getElementById('wiring-panel');
    let currentTarget = null; // { scvTag, selector, shadowRoot }

    function toggleMode() {
        currentMode = currentMode === 'view' ? 'wiring' : 'view';
        btnMode.innerHTML = `<span>[ ${currentMode.toUpperCase()} MODE ]</span>`;
        
        if (currentMode === 'wiring') btnMode.classList.add('active');
        else {
            btnMode.classList.remove('active');
            wPanel.classList.add('hidden'); // Close panel
        }
        
        Array.from(canvasContainer.children).forEach(node => {
            if (node.tagName.toLowerCase().startsWith('scv-') && node.shadowRoot) {
                applyWiringState(node.shadowRoot, currentMode === 'wiring');
            }
        });
        updateStatus();
    }

    function applyWiringState(shadow, isWiring) {
        if (isWiring) {
            if (!shadow.getElementById('mx-wiring-style')) {
                const style = document.createElement('style');
                style.id = 'mx-wiring-style';
                style.textContent = `
                    .mx-wired-node {
                        outline: 2px dashed var(--accent, #986c98) !important;
                        outline-offset: -2px;
                        cursor: crosshair !important;
                    }
                    .mx-wired-node:hover {
                        outline: 2px solid var(--secondary, #8ab6bb) !important;
                        background: rgba(138, 182, 187, 0.15) !important;
                    }
                `;
                shadow.appendChild(style);
            }
            const targets = shadow.querySelectorAll('button, input, textarea, select, h1, h2, h3, h4, p, img, a, span');
            targets.forEach(t => t.classList.add('mx-wired-node'));
        } else {
            const style = shadow.getElementById('mx-wiring-style');
            if (style) style.remove();
            const targets = shadow.querySelectorAll('.mx-wired-node');
            targets.forEach(t => t.classList.remove('mx-wired-node'));
            tooltip.style.display = 'none';
        }
    }

    btnMode.addEventListener('click', toggleMode);

    document.addEventListener('mousemove', e => {
        if(currentMode !== 'wiring' || !wPanel.classList.contains('hidden')) {
            tooltip.style.display = 'none';
            return;
        }
        const path = e.composedPath();
        const target = path.find(el => el.classList && el.classList.contains('mx-wired-node'));
        if (target) {
            tooltip.textContent = `<${target.tagName.toLowerCase()}>`;
            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
        } else {
            tooltip.style.display = 'none';
        }
    });

    document.addEventListener('click', (e) => {
        if (currentMode !== 'wiring') return;
        
        if(e.target.closest('#toolbar') || e.target.closest('#statusbar') || e.target.closest('#wiring-panel') || e.target.closest('#data-container')) return;

        const path = e.composedPath();
        const target = path.find(el => el.classList && el.classList.contains('mx-wired-node'));
        
        if (target) {
            e.preventDefault(); e.stopPropagation();
            const scvNode = path.find(el => el.tagName && el.tagName.toLowerCase().startsWith('scv-'));
            if (!scvNode) return;
            
            const scvTag = scvNode.tagName.toLowerCase();
            const selector = getSelector(target, scvNode.shadowRoot);
            
            currentTarget = { scvTag, selector, shadowRoot: scvNode.shadowRoot };
            
            const existing = wiringRegistry[scvTag] && wiringRegistry[scvTag][selector];
            if (existing) {
                document.querySelector(`input[name="w-type"][value="${existing.type}"]`).checked = true;
                document.getElementById('w-channel').value = existing.channel;
            } else {
                document.querySelector(`input[name="w-type"][value="output"]`).checked = true;
                document.getElementById('w-channel').value = '';
            }
            
            tooltip.style.display = 'none';
            wPanel.classList.remove('hidden');
            
            let pX = e.clientX + 15; let pY = e.clientY + 15;
            if (pX + 290 > window.innerWidth) pX = window.innerWidth - 300;
            if (pY + 160 > window.innerHeight) pY = window.innerHeight - 170;
            
            wPanel.style.left = pX + 'px';
            wPanel.style.top = pY + 'px';
        } else {
            wPanel.classList.add('hidden');
        }
    });

    document.getElementById('w-cancel').addEventListener('click', () => wPanel.classList.add('hidden'));
    
    document.getElementById('w-save').addEventListener('click', () => {
        if(!currentTarget) return;
        const type = document.querySelector('input[name="w-type"]:checked').value;
        const channel = document.getElementById('w-channel').value.trim();
        if(!channel) return alert("Channel name required");

        if(!wiringRegistry[currentTarget.scvTag]) wiringRegistry[currentTarget.scvTag] = {};
        wiringRegistry[currentTarget.scvTag][currentTarget.selector] = { type, channel };
        
        localStorage.setItem(STORE_WIRING, JSON.stringify(wiringRegistry));
        wPanel.classList.add('hidden');
        
        applyWiringEngine();
        updateStatus();
    });

    document.getElementById('w-remove').addEventListener('click', () => {
        if(!currentTarget || !wiringRegistry[currentTarget.scvTag]) return;
        delete wiringRegistry[currentTarget.scvTag][currentTarget.selector];
        localStorage.setItem(STORE_WIRING, JSON.stringify(wiringRegistry));
        wPanel.classList.add('hidden');
        
        applyWiringEngine();
        updateStatus();
    });


    // --- PHASE 3: DATA LAYER & THE REACTIVE RUNTIME ENGINE ---

    function renderDatabase() {
        const list = document.getElementById('notes-list');
        list.innerHTML = '';

        if(dbRecords.length === 0) {
            list.innerHTML = '<div style="color: #444; font-size: 12px; text-align: center; margin-top: 50px;">Database empty</div>';
            return;
        }

        // Render backwards (newest first)
        [...dbRecords].reverse().forEach(record => {
            const noteEl = document.createElement('div');
            noteEl.className = 'mx-note';
            
            noteEl.innerHTML = `
                <div class="mx-note-header">
                    <span class="mx-note-date">${new Date(record.id).toLocaleString()}</span>
                    <button class="mx-note-del" data-id="${record.id}">✖</button>
                </div>
                <div class="mx-note-body">${record.text}</div>
            `;

            noteEl.querySelector('.mx-note-del').addEventListener('click', (e) => {
                const targetId = parseInt(e.target.dataset.id);
                dbRecords = dbRecords.filter(n => n.id !== targetId);
                localStorage.setItem(STORE_DB, JSON.stringify(dbRecords));
                renderDatabase();
                updateStatus();
            });

            list.appendChild(noteEl);
        });
    }

    // THE BRAIN: Intercepts all signals
    rxHub.addEventListener('mx-signal', (e) => {
        const { channel, value } = e.detail;
        
        // 1. Store live value in RAM
        globalChannelState[channel] = value;

        // 2. Intercept System Commands
        if (channel === '$sys:add-note') {
            // Read from the expected channel
            const noteText = globalChannelState['nota-body'] || '';
            if (noteText.trim()) {
                dbRecords.push({ id: Date.now(), text: noteText });
                localStorage.setItem(STORE_DB, JSON.stringify(dbRecords));
                renderDatabase();
                updateStatus();
                // Optional: clear the input value after saving? 
                // We'll leave it as is to keep it brutal and simple.
            }
            return; // System commands don't need to be routed to UI elements
        }

        // 3. Normal DOM routing (Update Connected Inputs)
        activeInputs.forEach(input => {
            if (input.channel === channel) {
                if (input.el.tagName === 'INPUT' || input.el.tagName === 'TEXTAREA') {
                    input.el.value = value;
                } else {
                    input.el.textContent = value;
                }
                
                // Visual Ping
                const oldColor = input.el.style.color;
                input.el.style.color = 'var(--secondary)';
                setTimeout(() => input.el.style.color = oldColor, 200);
            }
        });
    });

    function applyWiringEngine() {
        activeInputs = []; 
        const nodes = canvasContainer.children;
        
        for (let i = 0; i < nodes.length; i++) {
            const scvNode = nodes[i];
            const scvTag = scvNode.tagName.toLowerCase();
            
            if (!scvTag.startsWith('scv-') || !scvNode.shadowRoot) continue;
            
            const nodeWiring = wiringRegistry[scvTag];
            if (!nodeWiring) continue;
            
            const shadow = scvNode.shadowRoot;
            
            Object.keys(nodeWiring).forEach(selector => {
                const config = nodeWiring[selector];
                const targetEl = shadow.querySelector(selector);
                if (!targetEl) return;
                
                if (config.type === 'input') {
                    activeInputs.push({ el: targetEl, channel: config.channel });
                } else if (config.type === 'output') {
                    if (!targetEl.dataset.mxWiredOut) {
                        targetEl.dataset.mxWiredOut = "true";
                        const eventType = (targetEl.tagName === 'INPUT' || targetEl.tagName === 'TEXTAREA' || targetEl.tagName === 'SELECT') ? 'input' : 'click';
                        
                        targetEl.addEventListener(eventType, (e) => {
                            if (currentMode === 'wiring') return; 
                            
                            let val = '';
                            if(targetEl.tagName === 'INPUT' || targetEl.tagName === 'TEXTAREA') val = e.target.value;
                            else val = e.target.textContent;

                            rxHub.dispatchEvent(new CustomEvent('mx-signal', { detail: { channel: config.channel, value: val } }));
                        });
                    }
                }
            });
        }
    }

    // Boot
    buildSystemMenu();
    initWorkspace();

  </script>
