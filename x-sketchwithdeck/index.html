<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deck</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg: #1a1c1c;
      --text: #aaabac;
      --accent: #986c98;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: linear-gradient(180deg, #222425 0%, var(--bg) 100%);
      border-bottom: 1px solid #2a2c2c;
      flex-shrink: 0;
      user-select: none;
    }
    
    #sketch-select {
      background: #252727;
      color: var(--text);
      border: 1px solid #3a3c3c;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      min-width: 180px;
      flex: 1;
      height: 36px;
      appearance: none;
      -webkit-appearance: none;
      background-image: none;
    }
    
    #sketch-select:hover {
      border-color: var(--accent);
    }
    
    #sketch-select:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .btn-group {
      display: flex;
      gap: 16px;
      margin-left: auto;
    }
    
    .btn {
      background: #252727;
      color: var(--text);
      border: 1px solid #3a3c3c;
      padding: 8px 16px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .btn.square {
      width: 36px;
      height: 36px;
      padding: 0;
      font-size: 16px;
      flex-shrink: 0;
    }
    
    .btn:hover {
      background: #2d2f30;
      border-color: var(--accent);
    }
    
    .btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    
    .btn.recording {
      background: #c44;
      color: #fff;
      border-color: #c44;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    #canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      overflow: hidden;
    }
    
    #canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      line-height: 0;
      width: 100%;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
    }
    
    #canvas-wrapper canvas {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    #statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      background: #151617;
      border-top: 1px solid #2a2c2c;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      user-select: none;
    }
    
    .status-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    
    .status-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-label {
      color: #666;
    }
    
    .status-value {
      color: var(--accent);
      font-weight: 500;
    }
    
    .status-divider {
      width: 1px;
      height: 12px;
      background: #3a3c3c;
    }
    
    .hidden {
      display: none !important;
    }
    
    #dialog-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    #dialog {
      background: var(--bg);
      border: 1px solid #3a3c3c;
      border-radius: 8px;
      width: 414px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }
    
    #dialog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #3a3c3c;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      user-select: none;
    }
    
    #dialog-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      user-select: none;
    }
    
    #dialog-body code {
      user-select: text;
    }
    
    #dialog-footer {
      display: flex;
      justify-content: center;
      padding: 16px;
      border-top: 1px solid #3a3c3c;
      user-select: none;
    }
    
    .dialog-actions {
      display: flex;
      justify-content: center;
      gap: 18px;
    }
    
    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .color-swatch {
      width: 36px;
      height: 36px;
      border: 1px solid #3a3c3c;
      cursor: pointer;
      padding: 0;
      overflow: hidden;
      border-radius: 0;
    }
    
    .color-swatch::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    
    .color-swatch::-webkit-color-swatch {
      border: none;
      border-radius: 0;
    }
    
    .color-name {
      flex: 1;
      background: #252727;
      color: var(--text);
      border: 1px solid #3a3c3c;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 13px;
    }
    
    .color-name:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .color-delete {
      background: transparent;
      color: #666;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 4px 8px;
    }
    
    .color-delete:hover {
      color: #c44;
    }
    
    #btn-add-color {
      width: 100%;
      margin-top: 8px;
      height: 36px;
    }
    
    .btn.square.small {
      width: 28px;
      height: 28px;
      font-size: 18px;
    }
    
    input[type="color"] {
      -webkit-appearance: none;
      background: #252727;
    }
    
    input[type="color"]::-webkit-color-swatch-wrapper {
      background: #252727;
    }
    
    #import-input {
      display: none;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button class="btn square" id="btn-help" title="help">
      <span>?</span>
    </button>
    <button class="btn square" id="btn-import" title="import colors">
      <span>↑</span>
    </button>
    <button class="btn square" id="btn-palette" title="color palette">
      <span>🟣</span>
    </button>
    <button class="btn square" id="btn-export" title="export colors">
      <span>↓</span>
    </button>
    <select id="sketch-select"></select>
    <div class="btn-group">
      <button class="btn square" id="btn-reload" title="reload sketch">
        <span>↻</span>
      </button>
      <button class="btn square" id="btn-play">
        <span id="play-icon">▶</span>
      </button>
      <button class="btn square" id="btn-record">
        <span id="record-icon">●</span>
      </button>
    </div>
  </div>
  
  <div id="canvas-container"></div>
  
    <div id="statusbar">
      <div class="status-left">
        <div class="status-item">
          <span class="status-label">fps</span>
          <span class="status-value" id="status-fps">--</span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
          <span class="status-label">frame</span>
          <span class="status-value" id="status-frame">--</span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
          <span class="status-label">time</span>
          <span class="status-value" id="status-time">00:00</span>
        </div>
      </div>
      <div class="status-right">
        <div class="status-item">
          <span class="status-label">state</span>
          <span class="status-value" id="status-state">paused</span>
        </div>
      </div>
  </div>

  <div id="dialog-overlay" class="hidden">
    <div id="dialog">
      <div id="dialog-header">
        <span>palette</span>
        <button class="btn square" id="dialog-close">✕</button>
      </div>
      <div id="dialog-body"></div>
      <div id="dialog-footer">
        <div></div>
        <div class="dialog-actions">
          <button class="btn square" id="btn-cancel">✕</button>
          <button class="btn square" id="btn-apply">✓</button>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="import-input" accept=".json" class="hidden">

  <script type="module">
    const selectEl = document.getElementById('sketch-select');
    
    async function loadSketches() {
      try {
        const response = await fetch('sketches/');
        const text = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const links = doc.querySelectorAll('a');
        const seen = new Set();
        const sketches = [];
        
        links.forEach(link => {
          const href = link.getAttribute('href');
          // Skip parent directory, query strings, and duplicates
          if (!href || href === '../' || href.startsWith('?') || seen.has(href)) return;
          seen.add(href);
          
          const filename = href.split('/').pop();
          if (filename && filename.endsWith('.js') && !href.includes('/og-bkp/')) {
            const name = filename.replace('.js', '');
            sketches.push({ name, path: 'sketches/' + filename });
          }
        });
        
        return sketches;
      } catch (e) {
        console.warn('Could not auto-load sketches, using defaults:', e);
        return [
          { name: 'test', path: 'sketches/test.js' },
          { name: 'orbitas', path: 'sketches/orbitas.js' }
        ];
      }
    }

    let SKETCHES = await loadSketches();
    
    selectEl.innerHTML = '';
    SKETCHES.forEach((sketch, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = sketch.name;
      selectEl.appendChild(opt);
    });

    let currentSketchIndex = 0;
    let isPlaying = false;
    let isRecording = false;
    let mediaRecorder = null;
    let recordedChunks = [];
    let p5Instance = null;
    let loadedSketchFn = null;
    let paletteColors = [];
    let tempPaletteColors = [];

    const playBtn = document.getElementById('btn-play');
    const recordBtn = document.getElementById('btn-record');
    const reloadBtn = document.getElementById('btn-reload');
    const paletteBtn = document.getElementById('btn-palette');
    const exportBtn = document.getElementById('btn-export');
    const importBtn = document.getElementById('btn-import');
    const playIcon = document.getElementById('play-icon');
    const recordIcon = document.getElementById('record-icon');
    const statusFps = document.getElementById('status-fps');
    const statusFrame = document.getElementById('status-frame');
    const statusTime = document.getElementById('status-time');
    const statusState = document.getElementById('status-state');
    const canvasContainer = document.getElementById('canvas-container');
    const dialogOverlay = document.getElementById('dialog-overlay');
    const dialogBody = document.getElementById('dialog-body');
    const dialogHeader = document.getElementById('dialog-header');
    const dialogFooter = document.getElementById('dialog-footer');
    const dialogClose = document.getElementById('dialog-close');
    const btnCancel = document.getElementById('btn-cancel');
    const btnApply = document.getElementById('btn-apply');
    const importInput = document.getElementById('import-input');
    
    let elapsedTime = 0;

    function loadColorsFromStorage() {
      const saved = localStorage.getItem('deckColors');
      if (saved) {
        try {
          paletteColors = JSON.parse(saved);
        } catch (e) {
          paletteColors = [];
        }
      }
    }

    function saveColorsToStorage() {
      localStorage.setItem('deckColors', JSON.stringify(paletteColors));
    }

    function getColorsObject() {
      const obj = {};
      paletteColors.forEach(c => {
        obj[c.name] = c.value;
      });
      return obj;
    }

    function exportColors() {
      const data = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        try {
          data[key] = JSON.parse(localStorage.getItem(key));
        } catch (e) {
          data[key] = localStorage.getItem(key);
        }
      }
      const blob = new Blob([JSON.stringify({ deck: data }, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'deck.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importColors(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (imported.deck) {
            Object.keys(imported.deck).forEach(key => {
              localStorage.setItem(key, JSON.stringify(imported.deck[key]));
            });
            loadColorsFromStorage();
            loadSketch(currentSketchIndex);
          } else if (Array.isArray(imported)) {
            paletteColors = imported;
            saveColorsToStorage();
            loadSketch(currentSketchIndex);
          }
        } catch (err) {
          console.error('Failed to import:', err);
        }
      };
      reader.readAsText(file);
    }

    function openPaletteDialog() {
      tempPaletteColors = JSON.parse(JSON.stringify(paletteColors));
      renderPaletteDialog();
      dialogOverlay.classList.remove('hidden');
    }

    function closePaletteDialog() {
      dialogOverlay.classList.add('hidden');
    }

    function renderPaletteDialog() {
      dialogBody.innerHTML = '';
      
      tempPaletteColors.forEach((color, index) => {
        const row = document.createElement('div');
        row.className = 'color-row';
        
        const swatch = document.createElement('input');
        swatch.type = 'color';
        swatch.className = 'color-swatch';
        swatch.value = color.value;
        swatch.addEventListener('input', (e) => {
          tempPaletteColors[index].value = e.target.value;
        });
        
        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'color-name';
        nameInput.value = color.name;
        nameInput.placeholder = 'color name';
        nameInput.addEventListener('input', (e) => {
          tempPaletteColors[index].name = e.target.value;
        });
        
        const delBtn = document.createElement('button');
        delBtn.className = 'color-delete';
        delBtn.innerHTML = '×';
        delBtn.addEventListener('click', () => {
          tempPaletteColors.splice(index, 1);
          renderPaletteDialog();
        });
        
        row.appendChild(swatch);
        row.appendChild(nameInput);
        row.appendChild(delBtn);
        dialogBody.appendChild(row);
      });
      
      const addBtn = document.createElement('button');
      addBtn.className = 'btn';
      addBtn.id = 'btn-add-color';
      addBtn.textContent = '+ add color';
      addBtn.addEventListener('click', () => {
        tempPaletteColors.push({ name: 'color' + tempPaletteColors.length, value: '#986c98' });
        renderPaletteDialog();
      });
      dialogBody.appendChild(addBtn);
    }

    function applyPalette() {
      paletteColors = JSON.parse(JSON.stringify(tempPaletteColors));
      saveColorsToStorage();
      closePaletteDialog();
      loadSketch(currentSketchIndex);
    }

    loadColorsFromStorage();

    let stateUIContainer = null;
    let currentSketchInfo = null;

    async function loadSketch(index) {
      // Clean up old state UI when switching sketches
      if (stateUIContainer) {
        stateUIContainer.remove();
        stateUIContainer = null;
      }
      
      if (p5Instance) {
        p5Instance.remove();
        p5Instance = null;
      }
      
      isPlaying = false;
      playIcon.textContent = '▶';
      
      currentSketchIndex = index;
      selectEl.value = index;
      elapsedTime = 0;
      
      canvasContainer.innerHTML = '<div id="canvas-wrapper"></div>';
      
      const basePath = window.location.origin + window.location.pathname.replace(/\/[^\/]+$/, '/');
      const module = await import(basePath + SKETCHES[index].path + '?t=' + Date.now());
      loadedSketchFn = module.default;
      
      const wrapper = document.getElementById('canvas-wrapper');
      const colorsObj = getColorsObject();
      p5Instance = new p5((p) => {
        p.colors = colorsObj;
        loadedSketchFn(p);
        
        const originalDraw = p.draw;
        p.draw = () => {
          if (isPlaying && originalDraw) {
            originalDraw();
          }
          updateStatus();
        };
      }, wrapper);
      
      // Auto-detect sketch info and create state UI
      if (p5Instance && p5Instance.getSketchInfo) {
        console.log('Found getSketchInfo, creating UI');
        createStateUI(() => p5Instance.getSketchInfo());
      } else {
        console.log('No getSketchInfo found on p5Instance');
        console.log('p5Instance keys:', p5Instance ? Object.keys(p5Instance) : 'null');
      }
      
      updateStatus();
    }
    
    function createStateUI(getSketchInfo) {
      // Remove existing state UI if any
      if (stateUIContainer) {
        stateUIContainer.remove();
      }
      
      try {
        const initialInfo = getSketchInfo();
        
        if (!initialInfo || !initialInfo.states || initialInfo.states.length === 0) {
          return;
        }
      } catch(e) {
        return;
      }
      
      // Create container for the ribbon
      stateUIContainer = document.createElement('div');
      stateUIContainer.id = 'state-ui-container';
      stateUIContainer.style.cssText = `
        position: fixed;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        z-index: 100;
        display: flex;
        align-items: center;
      `;
      
      // The visible tab with arrow (always visible) - bigger
      const tab = document.createElement('div');
      tab.id = 'state-ui-tab';
      tab.style.cssText = `
        background: rgba(30, 30, 30, 0.95);
        color: #aaabac;
        width: 30px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        border-radius: 4px 0 0 4px;
        cursor: pointer;
        border-top: 1px solid #3a3c3c;
        border-left: 1px solid #3a3c3c;
        border-bottom: 1px solid #3a3c3c;
        user-select: none;
      `;
      tab.innerHTML = '&#9658;'; // Right arrow
      
      // The sliding panel - hidden by default
      const statePanel = document.createElement('div');
      statePanel.id = 'state-ui';
      statePanel.style.cssText = `
        background: rgba(30, 30, 30, 0.95);
        color: #aaabac;
        padding: 8px 14px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        border: 1px solid #3a3c3c;
        border-right: none;
        border-radius: 4px 0 0 4px;
        user-select: none;
        transform: translateX(100%);
        transition: transform 0.2s ease;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 80vh;
        overflow-y: auto;
        opacity: 0;
        pointer-events: none;
      `;
      
      // Create state items container
      const statesContainer = document.createElement('div');
      statesContainer.id = 'states-list';
      statesContainer.style.cssText = `
        display: flex;
        flex-direction: column;
        gap: 4px;
      `;
      
      statePanel.appendChild(statesContainer);
      stateUIContainer.appendChild(statePanel);
      stateUIContainer.appendChild(tab);
      document.body.appendChild(stateUIContainer);
      
      // Hover behavior on the whole container
      stateUIContainer.addEventListener('mouseenter', () => {
        statePanel.style.transform = 'translateX(0)';
        statePanel.style.opacity = '1';
        statePanel.style.pointerEvents = 'auto';
        tab.innerHTML = '&#9668;'; // Left arrow
      });
      
      stateUIContainer.addEventListener('mouseleave', () => {
        statePanel.style.transform = 'translateX(100%)';
        statePanel.style.opacity = '0';
        statePanel.style.pointerEvents = 'none';
        tab.innerHTML = '&#9658;'; // Right arrow
      });
      
      function updateStateDisplay() {
        const info = getSketchInfo();
        const states = info.states || [];
        const currentState = info.current;
        const stateNames = info.names || {};
        
        statesContainer.innerHTML = '';
        
        states.forEach((stateKey) => {
          const stateItem = document.createElement('div');
          stateItem.style.cssText = `
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            ${stateKey === currentState ? 'background: #986c98;' : ''}
          `;
          stateItem.textContent = stateNames[stateKey] || stateKey;
          
          stateItem.addEventListener('click', (e) => {
            e.stopPropagation();
            // Call setState on the state machine
            const info2 = getSketchInfo();
            if (info2.actions && info2.actions.setState) {
              info2.actions.setState(stateKey);
            } else if (info2.actions && info2.actions.nextState) {
              // Fallback to nextState
              info2.actions.nextState();
            }
            updateStateDisplay();
          });
          
          statesContainer.appendChild(stateItem);
        });
      }
      
      updateStateDisplay();
    }

    function updateStatus() {
      if (p5Instance && isPlaying) {
        statusFps.textContent = Math.round(p5Instance.frameRate());
        statusFrame.textContent = p5Instance.frameCount;
      }
      if (isPlaying) {
        elapsedTime += 1/60;
      }
      const mins = Math.floor(elapsedTime / 60).toString().padStart(2, '0');
      const secs = Math.floor(elapsedTime % 60).toString().padStart(2, '0');
      statusTime.textContent = mins + ':' + secs;
      statusState.textContent = isPlaying ? 'playing' : 'paused';
      statusState.style.color = isPlaying ? '#986c98' : '#c44';
    }

    function togglePlay() {
      isPlaying = !isPlaying;
      playIcon.textContent = isPlaying ? '⏸' : '▶';
      updateStatus();
    }

    function toggleRecord() {
      if (!isRecording) {
        startRecording();
      } else {
        stopRecording();
      }
    }

    function startRecording() {
      const canvas = canvasContainer.querySelector('canvas');
      if (!canvas) return;
      
      const stream = canvas.captureStream(60);
      recordedChunks = [];
      
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
      
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
          recordedChunks.push(e.data);
        }
      };
      
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${SKETCHES[currentSketchIndex].name}_${Date.now()}.webm`;
        a.click();
        URL.revokeObjectURL(url);
      };
      
      mediaRecorder.start();
      isRecording = true;
      recordBtn.classList.add('recording');
      recordIcon.textContent = '■';
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      isRecording = false;
      recordBtn.classList.remove('recording');
      recordIcon.textContent = '●';
    }

    playBtn.addEventListener('click', togglePlay);
    recordBtn.addEventListener('click', toggleRecord);
    reloadBtn.addEventListener('click', () => loadSketch(currentSketchIndex));
    paletteBtn.addEventListener('click', openPaletteDialog);
    exportBtn.addEventListener('click', exportColors);
    importBtn.addEventListener('click', () => importInput.click());
    
    // Help button
    const helpBtn = document.getElementById('btn-help');
    helpBtn.addEventListener('click', () => {
      const helpContent = `
        <div style="display:flex;flex-direction:column;gap:20px;">
          <div>
            <h4 style="color:#986c98;margin-bottom:8px;">exposing state machine</h4>
            <p style="color:#888;font-size:13px;line-height:1.5;">
              to make your sketch work with the state ui, add this to your sketch:<br><br>
              <code style="background:#222;padding:2px 6px;border-radius:3px;">p.getSketchInfo = function() {<br>
                &nbsp;&nbsp;return {<br>
                &nbsp;&nbsp;&nbsp;&nbsp;current: stateMachine.currentState,<br>
                &nbsp;&nbsp;&nbsp;&nbsp;states: Object.keys(stateMachine.states),<br>
                &nbsp;&nbsp;&nbsp;&nbsp;names: {...state names...},<br>
                &nbsp;&nbsp;&nbsp;&nbsp;actions: { nextState: () => {...} }<br>
                &nbsp;&nbsp;};<br>
              };</code>
            </p>
          </div>
          <div>
            <h4 style="color:#986c98;margin-bottom:8px;">using palette colors</h4>
            <p style="color:#888;font-size:13px;line-height:1.5;">
              colors defined in the palette are available as <code style="background:#222;padding:2px 6px;border-radius:3px;">p.colors.COLOR_NAME</code>.<br><br>
              example:<br>
              <code style="background:#222;padding:2px 6px;border-radius:3px;">p.fill(p.colors.primary);</code><br><br>
              or use the default palette array <code style="background:#222;padding:2px 6px;border-radius:3px;">p.colors</code> which contains all defined colors as an object.
            </p>
          </div>
        </div>
      `;
      dialogBody.innerHTML = helpContent;
      dialogHeader.querySelector('span').textContent = 'Help';
      dialogFooter.style.display = 'none';
      dialogOverlay.classList.remove('hidden');
      
      // Override close to restore dialog
      const originalClose = closePaletteDialog;
      closePaletteDialog = () => {
        dialogOverlay.classList.add('hidden');
        dialogFooter.style.display = 'flex';
        dialogHeader.querySelector('span').textContent = 'palette';
      };
    });
    
    importInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        importColors(e.target.files[0]);
        e.target.value = '';
      }
    });
    dialogClose.addEventListener('click', closePaletteDialog);
    btnCancel.addEventListener('click', closePaletteDialog);
    btnApply.addEventListener('click', applyPalette);
    dialogOverlay.addEventListener('click', (e) => {
      if (e.target === dialogOverlay) closePaletteDialog();
    });
    
    selectEl.addEventListener('change', (e) => {
      loadSketch(parseInt(e.target.value));
    });

    loadSketch(0);
    updateStatus();
  </script>
</body>
</html>
