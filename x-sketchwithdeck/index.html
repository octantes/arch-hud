<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deck</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg: #1a1c1c;
      --text: #aaabac;
      --accent: #986c98;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: linear-gradient(180deg, #222425 0%, var(--bg) 100%);
      border-bottom: 1px solid #2a2c2c;
      flex-shrink: 0;
      user-select: none;
    }
    
    #sketch-select {
      background: #252727;
      color: var(--text);
      border: 1px solid #3a3c3c;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      min-width: 180px;
      flex: 1;
      height: 36px;
      appearance: none;
      -webkit-appearance: none;
      background-image: none;
    }
    
    #sketch-select:hover {
      border-color: var(--accent);
    }
    
    #sketch-select:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .hidden {
      display: none !important;
    }
    
    .btn-group {
      display: flex;
      gap: 16px;
      margin-left: auto;
    }
    
    .btn {
      background: #252727;
      color: var(--text);
      border: 1px solid #3a3c3c;
      padding: 8px 16px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .btn.square {
      width: 36px;
      height: 36px;
      padding: 0;
      font-size: 16px;
      flex-shrink: 0;
    }
    
    .btn:hover {
      background: #2d2f30;
      border-color: var(--accent);
    }
    
    .btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    
    .btn.recording {
      background: #c44;
      color: #fff;
      border-color: #c44;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    #canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      overflow: hidden;
    }
    
    #canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      line-height: 0;
      width: 100%;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
    }
    
    #canvas-wrapper canvas {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    #statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      background: #151617;
      border-top: 1px solid #2a2c2c;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      user-select: none;
    }
    
    .status-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    
    .status-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-label {
      color: #666;
    }
    
    .status-value {
      color: var(--accent);
      font-weight: 500;
    }
    
    .status-divider {
      width: 1px;
      height: 12px;
      background: #3a3c3c;
    }
    
    #dialog-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    #dialog {
      background: var(--bg);
      border: 1px solid #3a3c3c;
      border-radius: 8px;
      width: 414px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }
    
    #dialog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #3a3c3c;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      user-select: none;
    }
    
    #dialog-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      user-select: none;
    }
    
    #dialog-body code {
      user-select: text;
    }
    
    #dialog-footer {
      display: flex;
      justify-content: center;
      padding: 16px;
      border-top: 1px solid #3a3c3c;
      user-select: none;
    }
    
    .dialog-actions {
      display: flex;
      justify-content: center;
      gap: 18px;
    }
    
    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .color-swatch {
      width: 36px;
      height: 36px;
      border: 1px solid #3a3c3c;
      cursor: pointer;
      padding: 0;
      overflow: hidden;
      border-radius: 0;
    }
    
    .color-swatch::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    
    .color-swatch::-webkit-color-swatch {
      border: none;
      border-radius: 0;
    }
    
    .color-name {
      flex: 1;
      background: #252727;
      color: var(--text);
      border: 1px solid #3a3c3c;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 13px;
    }
    
    .color-name:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .color-delete {
      background: transparent;
      color: #666;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 4px 8px;
    }
    
    .color-delete:hover {
      color: #c44;
    }
    
    #btn-add-color {
      width: 100%;
      margin-top: 8px;
      height: 36px;
    }
    
    .btn.square.small {
      width: 28px;
      height: 28px;
      font-size: 18px;
    }
    
    input[type="color"] {
      -webkit-appearance: none;
      background: #252727;
    }
    
    input[type="color"]::-webkit-color-swatch-wrapper {
      background: #252727;
    }
    
    #import-input {
      display: none;
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

  </style>
</head>
<body>
  <div id="toolbar">
    <button class="btn square" id="btn-help" title="help">
      <span>?</span>
    </button>
    <button class="btn square" id="btn-import" title="import colors">
      <span>↑</span>
    </button>
    <button class="btn square" id="btn-export" title="export colors">
      <span>↓</span>
    </button>
    <select id="sketch-select"></select>
    <div class="btn-group">
      <button class="btn square" id="btn-reload" title="reload sketch">
        <span>↻</span>
      </button>
      <button class="btn square" id="btn-play">
        <span id="play-icon">▶</span>
      </button>
      <button class="btn square" id="btn-record">
        <span id="record-icon">●</span>
      </button>
    </div>
  </div>
  
  <div id="canvas-container"></div>
  
  <div id="dialog-overlay" class="hidden">
    <div id="dialog">
      <div id="dialog-header">
        <span>help</span>
        <button class="btn square" id="dialog-close">✕</button>
      </div>
      <div id="dialog-body"></div>
    </div>
  </div>
  
    <div id="statusbar">
      <div class="status-left">
        <div class="status-item">
          <span class="status-label">fps</span>
          <span class="status-value" id="status-fps">--</span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
          <span class="status-label">frame</span>
          <span class="status-value" id="status-frame">--</span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
          <span class="status-label">time</span>
          <span class="status-value" id="status-time">00:00</span>
        </div>
      </div>
      <div class="status-right">
        <div class="status-item">
          <span class="status-label">state</span>
          <span class="status-value" id="status-state">paused</span>
        </div>
      </div>
  </div>

  <input type="file" id="import-input" accept=".json" class="hidden">

  <script type="module">
    const selectEl = document.getElementById('sketch-select');
    const dialogOverlay = document.getElementById('dialog-overlay');
    const dialogBody = document.getElementById('dialog-body');
    const dialogClose = document.getElementById('dialog-close');
    
    function openHelpDialog() {
      dialogBody.innerHTML = `
        <div>
          <h4>exposing state machine</h4>
          <p>
            to make your sketch work with the state ui, add this to your sketch:<br><br>
            <code>p.getSketchInfo = function() {<br>
              &nbsp;&nbsp;return {<br>
              &nbsp;&nbsp;&nbsp;&nbsp;current: stateMachine.currentState,<br>
              &nbsp;&nbsp;&nbsp;&nbsp;states: Object.keys(stateMachine.states),<br>
              &nbsp;&nbsp;&nbsp;&nbsp;names: {...state names...},<br>
              &nbsp;&nbsp;&nbsp;&nbsp;actions: { nextState: () => {...} }<br>
              &nbsp;&nbsp;};<br>
            };</code>
          </p>
        </div>
        <div>
          <h4>using palette colors</h4>
          <p>
            colors defined in the palette are available as <code>p.colors.COLOR_NAME</code>.<br><br>
            example:<br>
            <code>p.fill(p.colors.primary);</code><br><br>
            or use the default palette array <code>p.colors</code> which contains all defined colors as an object.
          </p>
        </div>
      `;
      dialogOverlay.classList.remove('hidden');
    }
    
    function closeHelpDialog() {
      dialogOverlay.classList.add('hidden');
    }
    
    async function loadSketches() {
      try {
        const response = await fetch('sketches/');
        const text = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const links = doc.querySelectorAll('a');
        const seen = new Set();
        const sketches = [];
        
        links.forEach(link => {
          const href = link.getAttribute('href');
          if (!href || href === '../' || href.startsWith('?') || seen.has(href)) return;
          seen.add(href);
          
          const filename = href.split('/').pop();
          if (filename && filename.endsWith('.js') && !href.includes('/og-bkp/')) {
            const name = filename.replace('.js', '');
            sketches.push({ name, path: 'sketches/' + filename });
          }
        });
        
        return sketches;
      } catch (e) {
        console.warn('Could not auto-load sketches, using defaults:', e);
        return [
          { name: 'test', path: 'sketches/test.js' },
          { name: 'orbitas', path: 'sketches/orbitas.js' }
        ];
      }
    }

    let SKETCHES = await loadSketches();
    
    selectEl.innerHTML = '';
    SKETCHES.forEach((sketch, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = sketch.name;
      selectEl.appendChild(opt);
    });

    let currentSketchIndex = 0;
    let isPlaying = false;
    let isRecording = false;
    let mediaRecorder = null;
    let recordedChunks = [];
    let p5Instance = null;
    let loadedSketchFn = null;
    let paletteColors = [];

    const playBtn = document.getElementById('btn-play');
    const recordBtn = document.getElementById('btn-record');
    const reloadBtn = document.getElementById('btn-reload');
    const exportBtn = document.getElementById('btn-export');
    const importBtn = document.getElementById('btn-import');
    const playIcon = document.getElementById('play-icon');
    const recordIcon = document.getElementById('record-icon');
    const statusFps = document.getElementById('status-fps');
    const statusFrame = document.getElementById('status-frame');
    const statusTime = document.getElementById('status-time');
    const statusState = document.getElementById('status-state');
    const canvasContainer = document.getElementById('canvas-container');
    const importInput = document.getElementById('import-input');
    
    let elapsedTime = 0;

    function loadColorsFromStorage() {
      const saved = localStorage.getItem('deckColors');
      if (saved) {
        try {
          paletteColors = JSON.parse(saved);
        } catch (e) {
          paletteColors = [];
        }
      }
    }

    function saveColorsToStorage() {
      localStorage.setItem('deckColors', JSON.stringify(paletteColors));
    }

    function getColorsObject() {
      const obj = {};
      paletteColors.forEach(c => {
        obj[c.name] = c.value;
      });
      return obj;
    }

    function exportColors() {
      const data = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        try {
          data[key] = JSON.parse(localStorage.getItem(key));
        } catch (e) {
          data[key] = localStorage.getItem(key);
        }
      }
      const blob = new Blob([JSON.stringify({ deck: data }, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'deck.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importColors(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (imported.deck) {
            Object.keys(imported.deck).forEach(key => {
              localStorage.setItem(key, JSON.stringify(imported.deck[key]));
            });
            loadColorsFromStorage();
            loadSketch(currentSketchIndex);
          } else if (Array.isArray(imported)) {
            paletteColors = imported;
            saveColorsToStorage();
            loadSketch(currentSketchIndex);
          }
        } catch (err) {
          console.error('Failed to import:', err);
        }
      };
      reader.readAsText(file);
    }

    loadColorsFromStorage();

    let stateUIContainer = null;

    async function loadSketch(index) {
      if (stateUIContainer) {
        stateUIContainer.remove();
        stateUIContainer = null;
      }
      
      if (p5Instance) {
        p5Instance.remove();
        p5Instance = null;
      }
      
      isPlaying = false;
      playIcon.textContent = '▶';
      
      currentSketchIndex = index;
      selectEl.value = index;
      elapsedTime = 0;
      
      canvasContainer.innerHTML = '<div id="canvas-wrapper"></div>';
      
      const basePath = window.location.origin + window.location.pathname.replace(/\/[^\/]+$/, '/');
      const module = await import(basePath + SKETCHES[index].path + '?t=' + Date.now());
      loadedSketchFn = module.default;
      
      const wrapper = document.getElementById('canvas-wrapper');
      const colorsObj = getColorsObject();
      p5Instance = new p5((p) => {
        p.colors = colorsObj;
        loadedSketchFn(p);
        
        const originalDraw = p.draw;
        p.draw = () => {
          if (isPlaying && originalDraw) {
            originalDraw();
          }
          updateStatus();
        };
      }, wrapper);
      
      if (p5Instance && p5Instance.getSketchInfo) {
        createStateUI(() => p5Instance.getSketchInfo());
      }
      
      updateStatus();
    }
    
    function createStateUI(getSketchInfo) {
      if (stateUIContainer) {
        stateUIContainer.remove();
      }
      
      try {
        const initialInfo = getSketchInfo();
        if (!initialInfo || !initialInfo.states || initialInfo.states.length === 0) {
          return;
        }
      } catch(e) {
        return;
      }
      
      stateUIContainer = document.createElement('div');
      stateUIContainer.id = 'state-ui-container';
      stateUIContainer.style.cssText = `
        position: fixed;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        z-index: 100;
        display: flex;
        align-items: stretch;
      `;
      
      const statePanel = document.createElement('div');
      statePanel.id = 'state-ui';
      statePanel.style.cssText = `
        background: rgba(30, 30, 30, 0.95);
        color: #aaabac;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        border: 1px solid #3a3c3c;
        border-right: none;
        border-radius: 4px 0 0 4px;
        user-select: none;
        transform: translateX(100%);
        transition: transform 0.2s ease, opacity 0.2s ease;
        display: flex;
        align-items: stretch;
        opacity: 0;
        pointer-events: none;
        width: 218px;
      `;
      
      const tab = document.createElement('div');
      tab.id = 'state-ui-tab';
      tab.style.cssText = `
        position: fixed;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(30, 30, 30, 0.95);
        color: #aaabac;
        width: 30px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        cursor: pointer;
        user-select: none;
        z-index: 101;
        border-radius: 4px 0 0 4px;
        border: 1px solid #3a3c3c;
        border-right: none;
        transition: border-color 0.15s ease;
      `;
      tab.addEventListener('mouseenter', () => {
        tab.style.borderColor = '#986c98';
        if (!isFixed) {
          statePanel.style.transform = 'translateX(0)';
          statePanel.style.opacity = '1';
          statePanel.style.pointerEvents = 'auto';
        }
      });
      tab.addEventListener('mouseleave', () => {
        tab.style.borderColor = '#3a3c3c';
        if (!isFixed) {
          statePanel.style.transform = 'translateX(100%)';
          statePanel.style.opacity = '0';
          statePanel.style.pointerEvents = 'none';
        }
      });
      
      let stateTimerSettings = {};
      let timerInterval = null;
      let currentTimerValue = 0;
      let timersEnabled = true;
      let loopEnabled;
      
      function loadTimerSettings() {
        const sketchName = SKETCHES[currentSketchIndex]?.name || 'default';
        try {
          const saved = localStorage.getItem('stateTimers_' + sketchName);
          if (saved) {
            const parsed = JSON.parse(saved);
            stateTimerSettings = parsed.stateTimers || {};
            timersEnabled = parsed.timersEnabled !== false;
            loopEnabled = parsed.loopEnabled || false;
          } else {
            const info = getSketchInfo();
            info.states?.forEach(s => {
              stateTimerSettings[s] = 30;
            });
            timersEnabled = true;
            loopEnabled = true;
          }
        } catch (e) {
          stateTimerSettings = {};
        }
      }
      
      function saveTimerSettings() {
        const sketchName = SKETCHES[currentSketchIndex]?.name || 'default';
        localStorage.setItem('stateTimers_' + sketchName, JSON.stringify({
          stateTimers: stateTimerSettings,
          timersEnabled,
          loopEnabled
        }));
      }
      
      function formatTime(seconds) {
        return seconds + 's';
      }
      
      function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        if (!timersEnabled || !isPlaying) return;
        
        const info = getSketchInfo();
        const currentState = info.current;
        currentTimerValue = stateTimerSettings[currentState] || 30;
        
        timerInterval = setInterval(() => {
          if (!isPlaying) return;
          
          currentTimerValue -= 0.1;
          renderTimerDisplay();
          
          if (currentTimerValue <= 0) {
            const info2 = getSketchInfo();
            const states = info2.states || [];
            const currentIdx = states.indexOf(info2.current);
            
            if (loopEnabled && currentIdx === states.length - 1) {
              if (info2.actions && info2.actions.setState) {
                info2.actions.setState(states[0]);
                resetTimerForState(states[0]);
              }
            } else if (currentIdx < states.length - 1) {
              if (info2.actions && info2.actions.setState) {
                info2.actions.setState(states[currentIdx + 1]);
                resetTimerForState(states[currentIdx + 1]);
              }
            } else {
              stopTimer();
            }
            
            updateStateDisplay();
          }
        }, 100);
      }
      
      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }
      
      function resetTimerForState(stateName) {
        currentTimerValue = stateTimerSettings[stateName] || 30;
        renderTimerDisplay();
        if (timersEnabled) {
          startTimer();
        }
      }
      
      function renderTimerDisplay() {
        const timerEls = statesContainer.querySelectorAll('.state-timer');
        timerEls.forEach(el => {
          const stateName = el.dataset.state;
          const info = getSketchInfo();
          const isActive = stateName === info.current;
          const value = isActive ? Math.max(0, Math.ceil(currentTimerValue)) : (stateTimerSettings[stateName] || 30);
          el.textContent = formatTime(value);
          el.style.color = isActive ? '#aaabac' : '#666';
        });
      }
      
      function renderControls() {
        controlsContainer.innerHTML = '';
        
        const loopBtn = document.createElement('div');
        loopBtn.style.cssText = `
          width: 16px;
          height: 16px;
          border: 1px solid ${loopEnabled ? '#986c98' : 'transparent'};
          background: ${loopEnabled ? '#986c98' : '#252727'};
          border-radius: 3px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 10px;
          cursor: pointer;
          color: ${loopEnabled ? '#1a1c1c' : '#aaabac'};
          flex-shrink: 0;
        `;
        loopBtn.innerHTML = '&#8634;';
        loopBtn.title = 'Loop';
        loopBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          loopEnabled = !loopEnabled;
          saveTimerSettings();
          renderControls();
        });
        
        const timerBtn = document.createElement('div');
        timerBtn.style.cssText = `
          width: 16px;
          height: 16px;
          border: 1px solid ${timersEnabled ? '#986c98' : 'transparent'};
          background: ${timersEnabled ? '#986c98' : '#252727'};
          border-radius: 3px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 10px;
          cursor: pointer;
          color: ${timersEnabled ? '#1a1c1c' : '#aaabac'};
          flex-shrink: 0;
        `;
        timerBtn.innerHTML = '&#9201;';
        timerBtn.title = 'Enable/Disable Timers';
        timerBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          timersEnabled = !timersEnabled;
          saveTimerSettings();
          renderControls();
          if (timersEnabled) {
            resetTimerForState(getSketchInfo().current);
          } else {
            stopTimer();
          }
          renderTimerDisplay();
        });
        
        controlsContainer.appendChild(loopBtn);
        controlsContainer.appendChild(timerBtn);
      }
      
      const statesContent = document.createElement('div');
      statesContent.style.cssText = `
        padding: 32px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: 80vh;
        overflow-y: auto;
        width: 188px;
      `;
      
      const statesContainer = document.createElement('div');
      statesContainer.style.cssText = `
        display: flex;
        flex-direction: column;
        gap: 8px;
      `;
      
      const controlsContainer = document.createElement('div');
      controlsContainer.style.cssText = `
        display: flex;
        gap: 8px;
      `;
      
      statesContent.appendChild(statesContainer);
      statesContent.appendChild(controlsContainer);
      statePanel.appendChild(statesContent);
      stateUIContainer.appendChild(statePanel);
      document.body.appendChild(stateUIContainer);
      document.body.appendChild(tab);
      
      let isFixed = false;
      const rightArrow = '&#9654;';
      const leftArrow = '&#9664;';
      tab.innerHTML = rightArrow;
      
      tab.addEventListener('click', (e) => {
        e.stopPropagation();
        isFixed = !isFixed;
        
        if (isFixed) {
          statePanel.style.transform = 'translateX(0)';
          statePanel.style.opacity = '1';
          statePanel.style.pointerEvents = 'auto';
          tab.innerHTML = leftArrow;
        } else {
          statePanel.style.transform = 'translateX(100%)';
          statePanel.style.opacity = '0';
          statePanel.style.pointerEvents = 'none';
          tab.innerHTML = rightArrow;
        }
      });
      
      statePanel.addEventListener('mouseenter', () => {
        if (!isFixed) {
          statePanel.style.transform = 'translateX(0)';
          statePanel.style.opacity = '1';
          statePanel.style.pointerEvents = 'auto';
        }
      });
      statePanel.addEventListener('mouseleave', () => {
        if (!isFixed) {
          statePanel.style.transform = 'translateX(100%)';
          statePanel.style.opacity = '0';
          statePanel.style.pointerEvents = 'none';
        }
      });
      
      function updateStateDisplay() {
        const info = getSketchInfo();
        const states = info.states || [];
        const currentState = info.current;
        const stateNames = info.names || {};
        
        statesContainer.innerHTML = '';
        
        states.forEach((stateKey) => {
          const isActive = stateKey === currentState;
          const stateRow = document.createElement('div');
          stateRow.style.cssText = `
            display: flex;
            align-items: center;
            gap: 8px;
          `;
          
          const stateItem = document.createElement('div');
          stateItem.style.cssText = `
            flex: 1;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            background: ${isActive ? '#986c98' : 'transparent'};
            color: ${isActive ? '#1a1c1c' : '#aaabac'};
            border: 1px solid transparent;
            transition: border-color 0.15s ease;
          `;
          stateItem.addEventListener('mouseenter', () => {
            stateItem.style.borderColor = '#986c98';
          });
          stateItem.addEventListener('mouseleave', () => {
            stateItem.style.borderColor = 'transparent';
          });
          stateItem.textContent = stateNames[stateKey] || stateKey;
          
          stateItem.addEventListener('click', (e) => {
            e.stopPropagation();
            const info2 = getSketchInfo();
            if (info2.actions && info2.actions.setState) {
              info2.actions.setState(stateKey);
            } else if (info2.actions && info2.actions.nextState) {
              info2.actions.nextState();
            }
            resetTimerForState(stateKey);
            updateStateDisplay();
            renderControls();
          });
          
          const timerDisplay = document.createElement('div');
          timerDisplay.className = 'state-timer';
          timerDisplay.dataset.state = stateKey;
          const timerValue = isActive ? Math.max(0, Math.ceil(currentTimerValue)) : (stateTimerSettings[stateKey] || 30);
          timerDisplay.textContent = formatTime(timerValue);
          timerDisplay.style.cssText = `
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: ${isActive ? '#aaabac' : '#666'};
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 3px;
            width: 28px;
            text-align: center;
            box-sizing: border-box;
          `;
          
          timerDisplay.addEventListener('click', (e) => {
            e.stopPropagation();
            const input = document.createElement('input');
            input.type = 'number';
            input.value = stateTimerSettings[stateKey] || 30;
            input.min = 1;
            input.style.cssText = `
              width: 28px;
              background: #252727;
              color: #aaabac;
              border: 1px solid #986c98;
              border-radius: 3px;
              font-family: 'JetBrains Mono', monospace;
              font-size: 10px;
              padding: 2px 4px;
              text-align: center;
              box-sizing: border-box;
            `;
            
            timerDisplay.innerHTML = '';
            timerDisplay.appendChild(input);
            input.focus();
            input.select();
            
            const finishEdit = () => {
              const newValue = parseInt(input.value) || 30;
              stateTimerSettings[stateKey] = newValue;
              saveTimerSettings();
              if (stateKey === getSketchInfo().current) {
                currentTimerValue = newValue;
              }
              renderTimerDisplay();
            };
            
            input.addEventListener('blur', finishEdit);
            input.addEventListener('keydown', (e) => {
              if (e.key === 'Enter') {
                finishEdit();
              } else if (e.key === 'Escape') {
                renderTimerDisplay();
              }
            });
          });
          
          stateRow.appendChild(stateItem);
          stateRow.appendChild(timerDisplay);
          statesContainer.appendChild(stateRow);
        });
        
        renderControls();
        renderTimerDisplay();
      }
      
      loadTimerSettings();
      const initialInfo = getSketchInfo();
      currentTimerValue = stateTimerSettings[initialInfo.current] || 30;
      updateStateDisplay();
      if (timersEnabled) {
        startTimer();
      }
    }

    function createPaletteUI() {
      const container = document.createElement('div');
      container.style.cssText = `
        position: fixed;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        z-index: 100;
        display: flex;
        align-items: stretch;
      `;
      
      const panel = document.createElement('div');
      panel.id = 'palette-ui';
      panel.style.cssText = `
        background: rgba(30, 30, 30, 0.95);
        color: #aaabac;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        border: 1px solid #3a3c3c;
        border-left: none;
        border-radius: 0 4px 4px 0;
        user-select: none;
        transform: translateX(-100%);
        transition: transform 0.2s ease, opacity 0.2s ease;
        display: flex;
        justify-content: flex-end;
        align-items: stretch;
        opacity: 0;
        pointer-events: none;
        width: 218px;
      `;
      
      const contentWrapper = document.createElement('div');
      contentWrapper.style.cssText = `
        padding: 32px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
        width: 188px;
        flex-shrink: 0;
        max-height: 80vh;
      `;
      
      const tab = document.createElement('div');
      tab.id = 'palette-ui-tab';
      tab.style.cssText = `
        position: fixed;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(30, 30, 30, 0.95);
        color: #aaabac;
        width: 30px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        cursor: pointer;
        user-select: none;
        z-index: 101;
        border-radius: 0 4px 4px 0;
        border: 1px solid #3a3c3c;
        border-left: none;
        transition: border-color 0.15s ease;
      `;
      
      const colorsContainer = document.createElement('div');
      colorsContainer.style.cssText = `
        display: flex;
        flex-direction: column;
        gap: 12px;
      `;
      
      function renderColors() {
        colorsContainer.innerHTML = '';
        
        paletteColors.forEach((color, index) => {
          const row = document.createElement('div');
          row.style.cssText = `
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: space-between;
          `;
          
          const swatchWrapper = document.createElement('div');
          swatchWrapper.style.cssText = `
            width: 16px;
            height: 16px;
            cursor: pointer;
            background: ${color.value};
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
          `;
          
          const swatch = document.createElement('input');
          swatch.type = 'color';
          swatch.style.cssText = `
            position: absolute;
            top: -10px;
            left: -10px;
            width: 36px;
            height: 36px;
            border: none;
            cursor: pointer;
            background: transparent;
          `;
          swatch.value = color.value;
          swatch.addEventListener('input', (e) => {
            paletteColors[index].value = e.target.value;
            swatchWrapper.style.background = e.target.value;
            saveColorsToStorage();
          });
          
          swatchWrapper.appendChild(swatch);
          
          const nameInput = document.createElement('input');
          nameInput.type = 'text';
          nameInput.style.cssText = `
            width: 80px;
            height: 16px;
            background: transparent;
            color: #aaabac;
            border: none;
            padding: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
          `;
          nameInput.value = color.name;
          nameInput.placeholder = 'color name';
          nameInput.addEventListener('input', (e) => {
            paletteColors[index].name = e.target.value;
            saveColorsToStorage();
          });
          
          const delBtn = document.createElement('button');
          delBtn.style.cssText = `
            background: transparent;
            color: #666;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            width: 16px;
            flex-shrink: 0;
          `;
          delBtn.innerHTML = '×';
          delBtn.addEventListener('mouseenter', () => {
            delBtn.style.color = '#c44';
          });
          delBtn.addEventListener('mouseleave', () => {
            delBtn.style.color = '#666';
          });
          delBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            paletteColors.splice(index, 1);
            saveColorsToStorage();
            if (p5Instance) {
              p5Instance.colors = getColorsObject();
            }
            renderColors();
          });
          
          row.appendChild(swatchWrapper);
          row.appendChild(nameInput);
          row.appendChild(delBtn);
          colorsContainer.appendChild(row);
        });
      }
      
      function createAddButton() {
        const row = document.createElement('div');
        row.className = 'palette-add-row';
        row.style.cssText = `
          display: flex;
          align-items: center;
          gap: 10px;
        `;
        
        const addIcon = document.createElement('div');
        addIcon.style.cssText = `
          width: 16px;
          height: 16px;
          border: 1px solid transparent;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 16px;
          color: #aaabac;
          cursor: pointer;
          transition: border-color 0.15s ease;
          flex-shrink: 0;
        `;
        addIcon.innerHTML = '+';
        addIcon.addEventListener('mouseenter', () => {
          addIcon.style.borderColor = '#986c98';
        });
        addIcon.addEventListener('mouseleave', () => {
          addIcon.style.borderColor = 'transparent';
        });
        addIcon.addEventListener('click', () => {
          paletteColors.push({ name: 'color' + paletteColors.length, value: '#986c98' });
          saveColorsToStorage();
          if (p5Instance) {
            p5Instance.colors = getColorsObject();
          }
          renderColors();
        });
        
        const addText = document.createElement('span');
        addText.style.cssText = `
          color: #aaabac;
          font-family: 'JetBrains Mono', monospace;
          font-size: 12px;
          flex: 1;
        `;
        addText.textContent = 'add color';
        
        row.appendChild(addIcon);
        row.appendChild(addText);
        return row;
      }
      
      panel.appendChild(contentWrapper);
      contentWrapper.appendChild(colorsContainer);
      contentWrapper.appendChild(createAddButton());
      container.appendChild(panel);
      document.body.appendChild(container);
      document.body.appendChild(tab);
      
      renderColors();
      
      let isFixed = false;
      const rightArrow = '&#9654;';
      const leftArrow = '&#9664;';
      tab.innerHTML = rightArrow;
      
      tab.addEventListener('mouseenter', () => {
        tab.style.borderColor = '#986c98';
        if (!isFixed) {
          panel.style.transform = 'translateX(0)';
          panel.style.opacity = '1';
          panel.style.pointerEvents = 'auto';
        }
      });
      tab.addEventListener('mouseleave', () => {
        tab.style.borderColor = '#3a3c3c';
        if (!isFixed) {
          panel.style.transform = 'translateX(-100%)';
          panel.style.opacity = '0';
          panel.style.pointerEvents = 'none';
        }
      });
      
      panel.addEventListener('mouseenter', () => {
        if (!isFixed) {
          panel.style.transform = 'translateX(0)';
          panel.style.opacity = '1';
          panel.style.pointerEvents = 'auto';
        }
      });
      panel.addEventListener('mouseleave', () => {
        if (!isFixed) {
          panel.style.transform = 'translateX(-100%)';
          panel.style.opacity = '0';
          panel.style.pointerEvents = 'none';
        }
      });
      
      tab.addEventListener('click', (e) => {
        e.stopPropagation();
        isFixed = !isFixed;
        
        if (isFixed) {
          panel.style.transform = 'translateX(0)';
          panel.style.opacity = '1';
          panel.style.pointerEvents = 'auto';
          tab.innerHTML = leftArrow;
        } else {
          panel.style.transform = 'translateX(-100%)';
          panel.style.opacity = '0';
          panel.style.pointerEvents = 'none';
          tab.innerHTML = rightArrow;
        }
      });
    }

    function updateStatus() {
      if (p5Instance && isPlaying) {
        statusFps.textContent = Math.round(p5Instance.frameRate());
        statusFrame.textContent = p5Instance.frameCount;
      }
      if (isPlaying) {
        elapsedTime += 1/60;
      }
      const mins = Math.floor(elapsedTime / 60).toString().padStart(2, '0');
      const secs = Math.floor(elapsedTime % 60).toString().padStart(2, '0');
      statusTime.textContent = mins + ':' + secs;
      statusState.textContent = isPlaying ? 'playing' : 'paused';
      statusState.style.color = isPlaying ? '#986c98' : '#c44';
    }

    function togglePlay() {
      isPlaying = !isPlaying;
      playIcon.textContent = isPlaying ? '⏸' : '▶';
      
      if (isPlaying && timersEnabled) {
        startTimer();
      } else if (!isPlaying) {
        stopTimer();
      }
      
      updateStatus();
    }

    function toggleRecord() {
      if (!isRecording) {
        startRecording();
      } else {
        stopRecording();
      }
    }

    function startRecording() {
      const canvas = canvasContainer.querySelector('canvas');
      if (!canvas) return;
      
      const stream = canvas.captureStream(60);
      recordedChunks = [];
      
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 16000000 });
      
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
          recordedChunks.push(e.data);
        }
      };
      
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${SKETCHES[currentSketchIndex].name}_${Date.now()}.webm`;
        a.click();
        URL.revokeObjectURL(url);
      };
      
      mediaRecorder.start();
      isRecording = true;
      recordBtn.classList.add('recording');
      recordIcon.textContent = '■';
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      isRecording = false;
      recordBtn.classList.remove('recording');
      recordIcon.textContent = '●';
    }

    playBtn.addEventListener('click', togglePlay);
    recordBtn.addEventListener('click', toggleRecord);
    reloadBtn.addEventListener('click', () => loadSketch(currentSketchIndex));
    exportBtn.addEventListener('click', exportColors);
    importBtn.addEventListener('click', () => importInput.click());
    
    const helpBtn = document.getElementById('btn-help');
    helpBtn.addEventListener('click', openHelpDialog);
    dialogClose.addEventListener('click', closeHelpDialog);
    dialogOverlay.addEventListener('click', (e) => {
      if (e.target === dialogOverlay) closeHelpDialog();
    });
    
    importInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        importColors(e.target.files[0]);
        e.target.value = '';
      }
    });
    
    selectEl.addEventListener('change', (e) => {
      loadSketch(parseInt(e.target.value));
    });

    loadSketch(0);
    createPaletteUI();
    updateStatus();
  </script>
</body>
</html>
