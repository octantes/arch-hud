<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg: #1a1c1c;
      --text: #aaabac;
      --accent: #986c98;
      --panel-bg: #252727;
      --border: #3a3c3c;
      --danger: #c44;
      --danger-light: #8ab6bb;
      --fixed-panel-bg: rgba(30, 30, 30, 0.95);
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: linear-gradient(180deg, #222425 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      user-select: none;
    }
    
    #sketch-select {
      background: var(--panel-bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 12px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      min-width: 180px;
      flex: 1;
      height: 36px;
      appearance: none;
      -webkit-appearance: none;
      background-image: none;
    }
    
    #sketch-select:hover {
      border-color: var(--accent);
    }
    
    #sketch-select:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .hidden {
      display: none !important;
    }
    
    .btn-group {
      display: flex;
      gap: 16px;
      margin-left: auto;
    }
    
    .btn {
      background: var(--panel-bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 16px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .btn.square {
      width: 36px;
      height: 36px;
      padding: 0;
      font-size: 16px;
      flex-shrink: 0;
    }
    
    .btn:hover {
      background: #2d2f30;
      border-color: var(--accent);
    }
    
    .btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    
    .btn.recording {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
      animation: pulse 1s infinite;
    }

    .btn.armed {
      background: var(--danger-light);
      color: #fff;
      border-color: var(--danger-light);
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    #canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      overflow: hidden;
    }
    
    #canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      line-height: 0;
      width: 100%;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
    }
    
    #canvas-wrapper canvas {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    #statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      background: #151617;
      border-top: 1px solid var(--border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      user-select: none;
    }
    
    .status-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    
    .status-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-label {
      color: #666;
    }
    
    .status-value {
      color: var(--accent);
      font-weight: 500;
    }
    
    .status-divider {
      width: 1px;
      height: 12px;
      background: var(--border);
    }
    
    #status-state.is-playing {
      color: var(--accent);
    }
    
    #dialog-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    #dialog {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 414px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }
    
    #dialog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      user-select: none;
    }
    
    #dialog-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      user-select: none;
    }
    
    #dialog-body h4 {
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    #dialog-body p {
      color: var(--text);
      font-size: 11px;
      line-height: 1.5;
    }
    
    input[type="color"] {
      -webkit-appearance: none;
      background: var(--panel-bg);
    }
    
    input[type="color"]::-webkit-color-swatch-wrapper {
      background: var(--panel-bg);
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    #state-ui-container {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      align-items: stretch;
    }

    #state-ui {
      background: var(--fixed-panel-bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 4px 0 0 4px;
      user-select: none;
      transform: translateX(100%);
      transition: transform 0.2s ease, opacity 0.2s ease;
      display: flex;
      align-items: stretch;
      opacity: 0;
      pointer-events: none;
      width: 218px;
    }

    #state-ui.is-visible,
    #state-ui.is-fixed {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    #state-ui-tab {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: var(--fixed-panel-bg);
      color: var(--text);
      width: 30px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
      z-index: 101;
      border-radius: 4px 0 0 4px;
      border: 1px solid var(--border);
      border-right: none;
      transition: border-color 0.15s ease;
    }

    #state-ui-tab.is-active {
      border-color: var(--accent);
    }

    .state-content {
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 80vh;
      overflow-y: auto;
      width: 188px;
    }

    .state-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .state-controls {
      display: flex;
      gap: 8px;
    }

    .state-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .state-item {
      flex: 1;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      background: transparent;
      color: var(--text);
      border: 1px solid transparent;
      transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    .state-item.is-hovered,
    .state-item:hover {
      border-color: var(--accent);
    }

    .state-item.is-active {
      background: var(--accent);
      color: var(--bg);
    }

    .state-timer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #666;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      width: 28px;
      text-align: center;
      box-sizing: border-box;
    }

    .state-timer.is-active {
      color: var(--text);
    }

    .timer-input {
      width: 28px;
      background: var(--panel-bg);
      color: var(--text);
      border: 1px solid var(--accent);
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 2px 4px;
      text-align: center;
      box-sizing: border-box;
    }

    #palette-container {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      align-items: stretch;
    }

    #palette-ui {
      background: var(--fixed-panel-bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 4px 4px 0;
      user-select: none;
      transform: translateX(-100%);
      transition: transform 0.2s ease, opacity 0.2s ease;
      display: flex;
      justify-content: flex-end;
      align-items: stretch;
      opacity: 0;
      pointer-events: none;
      width: 218px;
    }

    #palette-ui.is-visible,
    #palette-ui.is-fixed {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    #palette-tab {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      background: var(--fixed-panel-bg);
      color: var(--text);
      width: 30px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
      z-index: 101;
      border-radius: 0 4px 4px 0;
      border: 1px solid var(--border);
      border-left: none;
      transition: border-color 0.15s ease;
    }

    #palette-tab.is-active {
      border-color: var(--accent);
    }

    .palette-content {
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      width: 188px;
      flex-shrink: 0;
      max-height: 80vh;
    }

    .palette-colors {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .palette-row {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: space-between;
    }

    .swatch-wrapper {
      width: 16px;
      height: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .color-picker {
      position: absolute;
      top: -10px;
      left: -10px;
      width: 36px;
      height: 36px;
      border: none;
      cursor: pointer;
      background: transparent;
    }

    .name-input {
      width: 80px;
      height: 16px;
      background: transparent;
      color: var(--text);
      border: none;
      padding: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .delete-btn {
      background: transparent;
      color: #666;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      width: 16px;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: var(--danger);
    }

    .palette-add-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .add-icon {
      width: 16px;
      height: 16px;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s ease;
      flex-shrink: 0;
    }

    .add-icon.is-hovered,
    .add-icon:hover {
      border-color: var(--accent);
    }

    .add-text {
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      flex: 1;
    }

    .control-btn {
      width: 16px;
      height: 16px;
      border: 1px solid transparent;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .control-btn.is-enabled {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--bg);
    }

    .control-btn.is-disabled {
      background: var(--panel-bg);
      color: var(--text);
    }

  </style>
</head>
<body>
  <div id="toolbar">
    <button class="btn square" id="btn-help" title="help">
      <span>?</span>
    </button>
    <button class="btn square" id="btn-import" title="import colors">
      <span>↑</span>
    </button>
    <button class="btn square" id="btn-export" title="export colors">
      <span>↓</span>
    </button>
    <select id="sketch-select"></select>
    <div class="btn-group">
      <button class="btn square" id="btn-reload" title="reload sketch">
        <span id="reload-icon"></span>
      </button>
      <button class="btn square" id="btn-play">
        <span id="play-icon"></span>
      </button>
      <button class="btn square" id="btn-record">
        <span id="record-icon"></span>
      </button>
    </div>
  </div>
  
  <div id="canvas-container"></div>
  
  <div id="dialog-overlay" class="hidden">
    <div id="dialog">
      <div id="dialog-header">
        <span>help</span>
        <button class="btn square" id="dialog-close"></button>
      </div>
      <div id="dialog-body"></div>
    </div>
  </div>
  
    <div id="statusbar">
      <div class="status-left">
        <div class="status-item">
          <span class="status-label">fps</span>
          <span class="status-value" id="status-fps">--</span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
          <span class="status-label">frame</span>
          <span class="status-value" id="status-frame">--</span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
          <span class="status-label">time</span>
          <span class="status-value" id="status-time">00:00</span>
        </div>
      </div>
      <div class="status-right">
        <div class="status-item">
          <span class="status-label">state</span>
          <span class="status-value" id="status-state">paused</span>
        </div>
      </div>
  </div>

  <input type="file" id="import-input" accept=".json" class="hidden">

  <script type="module">
    const DEFAULT_TIMER = 30;
    const TIMER_INTERVAL = 100;
    const VIDEO_BITRATE = 16000000;
    const CAPTURE_FRAMERATE = 60;
    const ICONS = {
      reload: '↻',
      play: '▶',
      pause: '⏸',
      record: '●',
      recordArmed: '⬤',
      stop: '■',
      arrowRight: '&#9654;',
      arrowLeft: '&#9664;',
      close: '✕',
      loop: '&#8634;',
      timer: '&#9201;'
    };

    const selectEl = document.getElementById('sketch-select');
    const dialogOverlay = document.getElementById('dialog-overlay');
    const dialogBody = document.getElementById('dialog-body');
    
    function getAccentColor() {
      return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#986c98';
    }
    
    function openHelpDialog() {
      dialogBody.innerHTML = `
        <div>
          <h4>exposing state machine</h4>
          <p>
            to make your sketch work with the state ui, add this to your sketch:<br><br>
            <code>p.getSketchInfo = function() {<br>
              &nbsp;&nbsp;return {<br>
              &nbsp;&nbsp;&nbsp;&nbsp;current: stateMachine.currentState,<br>
              &nbsp;&nbsp;&nbsp;&nbsp;states: Object.keys(stateMachine.states),<br>
              &nbsp;&nbsp;&nbsp;&nbsp;names: {/* state names */},<br>
              &nbsp;&nbsp;&nbsp;&nbsp;actions: { nextState: () => {/* action */} }<br>
              &nbsp;&nbsp;};<br>
            };</code>
          </p>
        </div>
        <div>
          <h4>using palette colors</h4>
          <p>
            colors defined in the palette are available as <code>p.colors.COLOR_NAME</code>.<br><br>
            example:<br>
            <code>p.fill(p.colors.primary);</code><br><br>
            or use the default palette array <code>p.colors</code> which contains all defined colors as an object.
          </p>
        </div>
        <div>
          <h4>recording</h4>
          <p>
            press the record button to arm recording (cyan). actual recording starts when you press play.<br><br>
            this ensures the video captures only the animation, not the blank canvas time before pressing play.
          </p>
        </div>
      `;
      dialogOverlay.classList.remove('hidden');
    }
    
    function closeHelpDialog() {
      dialogOverlay.classList.add('hidden');
    }
    
    async function loadSketches() {
      try {
        const response = await fetch('sketches/');
        const text = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const links = doc.querySelectorAll('a');
        const seen = new Set();
        const sketches = [];
        
        links.forEach(link => {
          const href = link.getAttribute('href');
          if (!href || href === '../' || href.startsWith('?') || seen.has(href)) return;
          seen.add(href);
          
          const filename = href.split('/').pop();
          if (filename && filename.endsWith('.js')) {
            const name = filename.replace('.js', '');
            sketches.push({ name, path: 'sketches/' + filename });
          }
        });
        
        if (sketches.length === 0) {
          console.warn('No sketches found in sketches/ folder');
        }
        return sketches;
      } catch (e) {
        console.warn('Could not auto-load sketches:', e);
        return [];
      }
    }

    let SKETCHES = await loadSketches();
    
    selectEl.innerHTML = '';
    SKETCHES.forEach((sketch, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = sketch.name;
      selectEl.appendChild(opt);
    });

    let currentSketchIndex = 0;
    let isPlaying = false;
    let isRecording = false;
    let recordingArmed = false;
    let mediaRecorder = null;
    let recordedChunks = [];
    let p5Instance = null;
    let paletteColors = [];

    const playBtn = document.getElementById('btn-play');
    const recordBtn = document.getElementById('btn-record');
    const reloadBtn = document.getElementById('btn-reload');
    const exportBtn = document.getElementById('btn-export');
    const importBtn = document.getElementById('btn-import');
    const playIcon = document.getElementById('play-icon');
    const recordIcon = document.getElementById('record-icon');
    const reloadIcon = document.getElementById('reload-icon');
    const dialogClose = document.getElementById('dialog-close');
    const statusFps = document.getElementById('status-fps');
    const statusFrame = document.getElementById('status-frame');
    const statusTime = document.getElementById('status-time');
    const statusState = document.getElementById('status-state');
    const canvasContainer = document.getElementById('canvas-container');
    const importInput = document.getElementById('import-input');
    
    reloadIcon.innerHTML = ICONS.reload;
    playIcon.innerHTML = ICONS.play;
    recordIcon.innerHTML = ICONS.record;
    dialogClose.innerHTML = ICONS.close;
    
    let elapsedTime = 0;
    
    let stateTimerSettings = {};
    let timerInterval = null;
    let currentTimerValue = 0;
    let getSketchInfoGlobal = null;
    let timersEnabled = true;
    let loopEnabled = true;
    let updateStateDisplayInner = null;
    let timerStartTime = 0;
    let timerTargetDuration = 0;
    
    function formatTime(seconds) {
      return seconds + 's';
    }
    
    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      if (!timersEnabled || !isPlaying) return;
      if (!getSketchInfoGlobal) return;
      
      const info = getSketchInfoGlobal();
      if (!info || !info.states || !info.current) return;
      
      const currentState = info.current;
      timerTargetDuration = stateTimerSettings[currentState] || DEFAULT_TIMER;
      timerStartTime = performance.now();
      
      timerInterval = setInterval(() => {
        if (!isPlaying) return;
        if (!getSketchInfoGlobal) return;
        
        currentTimerValue = timerTargetDuration - (performance.now() - timerStartTime) / 1000;
        renderTimerDisplay();
        
        if (currentTimerValue <= 0) {
          const info2 = getSketchInfoGlobal();
          if (!info2) return;
          const states = info2.states || [];
          const currentIdx = states.indexOf(info2.current);
          
          if (loopEnabled && currentIdx === states.length - 1) {
            if (info2.actions && info2.actions.setState) {
              info2.actions.setState(states[0]);
              resetTimerForState(states[0]);
              updateStateDisplay();
              return;
            }
          } else if (currentIdx < states.length - 1) {
            if (info2.actions && info2.actions.setState) {
              info2.actions.setState(states[currentIdx + 1]);
              resetTimerForState(states[currentIdx + 1]);
              updateStateDisplay();
              return;
            }
          }
          
          stopTimer();
          updateStateDisplay();
        }
      }, TIMER_INTERVAL);
    }
    
    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }
    
    function resetTimerForState(stateName) {
      timerTargetDuration = stateTimerSettings[stateName] || DEFAULT_TIMER;
      timerStartTime = performance.now();
      if (timersEnabled && isPlaying) {
        if (timerInterval) clearInterval(timerInterval);
        startTimer();
      }
      renderTimerDisplay();
    }
    
    function renderTimerDisplay() {
      const timerEls = document.querySelectorAll('.state-timer');
      timerEls.forEach(el => {
        const stateName = el.dataset.state;
        const info = getSketchInfoGlobal?.();
        const isActive = stateName === info?.current;
        const value = isActive ? Math.max(0, Math.ceil(currentTimerValue)) : (stateTimerSettings[stateName] || DEFAULT_TIMER);
        el.textContent = formatTime(value);
      });
    }
    
    function updateStateDisplay() {
      if (updateStateDisplayInner) {
        updateStateDisplayInner();
      }
    }

    function loadColorsFromStorage() {
      const saved = localStorage.getItem('deckColors');
      if (saved) {
        try {
          paletteColors = JSON.parse(saved);
        } catch (e) {
          paletteColors = [];
        }
      }
    }

    function saveColorsToStorage() {
      localStorage.setItem('deckColors', JSON.stringify(paletteColors));
    }

    function getColorsObject() {
      const obj = {};
      paletteColors.forEach(c => {
        obj[c.name] = c.value;
      });
      return obj;
    }

    function exportColors() {
      const data = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        try {
          data[key] = JSON.parse(localStorage.getItem(key));
        } catch (e) {
          data[key] = localStorage.getItem(key);
        }
      }
      const blob = new Blob([JSON.stringify({ deck: data }, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'deck.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importColors(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (imported.deck) {
            Object.keys(imported.deck).forEach(key => {
              localStorage.setItem(key, JSON.stringify(imported.deck[key]));
            });
            loadColorsFromStorage();
            loadSketch(currentSketchIndex);
          } else if (Array.isArray(imported)) {
            paletteColors = imported;
            saveColorsToStorage();
            loadSketch(currentSketchIndex);
          }
        } catch (err) {
          console.error('Failed to import:', err);
        }
      };
      reader.readAsText(file);
    }

    loadColorsFromStorage();

    let stateUIContainer = null;
    let stateUITab = null;
    let paletteContainer = null;
    let paletteTab = null;
    let paletteUICreated = false;
    let getP5Instance = null;

    async function loadSketch(index) {
      if (stateUIContainer) {
        stateUIContainer.remove();
        stateUIContainer = null;
      }
      if (stateUITab) {
        stateUITab.remove();
        stateUITab = null;
      }

      if (p5Instance) {
        p5Instance.remove();
        p5Instance = null;
      }
      
      if (isRecording) {
        stopRecording();
      }
      recordingArmed = false;
      isPlaying = false;
      playIcon.textContent = ICONS.play;
      
      if (SKETCHES.length === 0) {
        console.warn('No sketches available');
        return;
      }
      
      index = Math.min(Math.max(index, 0), SKETCHES.length - 1);
      currentSketchIndex = index;
      selectEl.value = index;
      elapsedTime = 0;
      
      canvasContainer.innerHTML = '<div id="canvas-wrapper"></div>';
      
      const basePath = window.location.origin + window.location.pathname.replace(/\/[^\/]+$/, '/');
      const module = await import(basePath + SKETCHES[index].path + '?t=' + Date.now());
      
      const wrapper = document.getElementById('canvas-wrapper');
      const colorsObj = getColorsObject();
      getP5Instance = () => p5Instance;
      p5Instance = new p5((p) => {
        p.colors = colorsObj;
        module.default(p);
        
        const originalDraw = p.draw;
        p.draw = () => {
          if (isPlaying && originalDraw) {
            originalDraw();
          }
          updateStatus();
        };
      }, wrapper);
      
      if (p5Instance && p5Instance.getSketchInfo) {
        createStateUI(() => p5Instance.getSketchInfo());
      } else {
        updateStateDisplayInner = null;
      }
      
      updateStatus();
      
      if (!paletteUICreated) {
        createPaletteUI();
        paletteUICreated = true;
      }
    }
    
    function createStateUI(getSketchInfo) {
      try {
        const initialInfo = getSketchInfo();
        if (!initialInfo || !initialInfo.states || initialInfo.states.length === 0) {
          return;
        }
      } catch(e) {
        return;
      }
      
      getSketchInfoGlobal = getSketchInfo;
      
      stateUIContainer = document.createElement('div');
      stateUIContainer.id = 'state-ui-container';
      
      const statePanel = document.createElement('div');
      statePanel.id = 'state-ui';
      
      const tab = document.createElement('div');
      tab.id = 'state-ui-tab';
      tab.innerHTML = ICONS.arrowRight;
      
      let isFixed = false;
      
      tab.addEventListener('mouseenter', () => {
        tab.classList.add('is-active');
        if (!isFixed) {
          statePanel.classList.add('is-visible');
        }
      });
      tab.addEventListener('mouseleave', () => {
        tab.classList.remove('is-active');
        if (!isFixed) {
          statePanel.classList.remove('is-visible');
        }
      });
      
      function loadTimerSettings() {
        const sketchName = SKETCHES[currentSketchIndex]?.name || 'default';
        try {
          const saved = localStorage.getItem('stateTimers_' + sketchName);
          if (saved) {
            const parsed = JSON.parse(saved);
            stateTimerSettings = parsed.stateTimers || {};
            timersEnabled = parsed.timersEnabled !== false;
            loopEnabled = parsed.loopEnabled ?? false;
          } else {
            const info = getSketchInfoGlobal?.();
            if (info?.states) {
              info.states.forEach(s => {
                stateTimerSettings[s] = DEFAULT_TIMER;
              });
            }
            timersEnabled = true;
            loopEnabled = true;
          }
        } catch (e) {
          stateTimerSettings = {};
        }
      }
      
      function saveTimerSettings() {
        const sketchName = SKETCHES[currentSketchIndex]?.name || 'default';
        localStorage.setItem('stateTimers_' + sketchName, JSON.stringify({
          stateTimers: stateTimerSettings,
          timersEnabled,
          loopEnabled
        }));
      }
      
      function renderControls() {
        controlsContainer.innerHTML = '';
        
        const loopBtn = document.createElement('div');
        loopBtn.className = 'control-btn ' + (loopEnabled ? 'is-enabled' : 'is-disabled');
        loopBtn.innerHTML = ICONS.loop;
        loopBtn.title = 'Loop';
        loopBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          loopEnabled = !loopEnabled;
          saveTimerSettings();
          renderControls();
        });
        
        const timerBtn = document.createElement('div');
        timerBtn.className = 'control-btn ' + (timersEnabled ? 'is-enabled' : 'is-disabled');
        timerBtn.innerHTML = ICONS.timer;
        timerBtn.title = 'Enable/Disable Timers';
        timerBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          timersEnabled = !timersEnabled;
          saveTimerSettings();
          renderControls();
          if (timersEnabled) {
            resetTimerForState(getSketchInfoGlobal?.().current);
          } else {
            stopTimer();
          }
          renderTimerDisplay();
        });
        
        controlsContainer.appendChild(loopBtn);
        controlsContainer.appendChild(timerBtn);
      }
      
      const statesContent = document.createElement('div');
      statesContent.className = 'state-content';
      
      const statesContainer = document.createElement('div');
      statesContainer.className = 'state-list';
      
      const controlsContainer = document.createElement('div');
      controlsContainer.className = 'state-controls';
      
      statesContent.appendChild(statesContainer);
      statesContent.appendChild(controlsContainer);
      statePanel.appendChild(statesContent);
      stateUIContainer.appendChild(statePanel);
      document.body.appendChild(stateUIContainer);
      stateUITab = tab;
      document.body.appendChild(tab);
      
      tab.addEventListener('click', (e) => {
        e.stopPropagation();
        isFixed = !isFixed;
        
        if (isFixed) {
          statePanel.classList.add('is-fixed');
          tab.classList.add('is-active');
          tab.innerHTML = ICONS.arrowLeft;
        } else {
          statePanel.classList.remove('is-fixed');
          tab.classList.remove('is-active');
          tab.innerHTML = ICONS.arrowRight;
        }
      });
      
      statePanel.addEventListener('mouseenter', () => {
        if (!isFixed) {
          statePanel.classList.add('is-visible');
        }
      });
      statePanel.addEventListener('mouseleave', () => {
        if (!isFixed) {
          statePanel.classList.remove('is-visible');
        }
      });
      
      function updateStateDisplay() {
        const info = getSketchInfoGlobal?.();
        const states = info.states || [];
        const currentState = info.current;
        const stateNames = info.names || {};
        
        statesContainer.innerHTML = '';
        
        states.forEach((stateKey) => {
          const isActive = stateKey === currentState;
          const stateRow = document.createElement('div');
          stateRow.className = 'state-row';
          
          const stateItem = document.createElement('div');
          stateItem.className = 'state-item' + (isActive ? ' is-active' : '');
          stateItem.textContent = stateNames[stateKey] || stateKey;
          
          stateItem.addEventListener('click', (e) => {
            e.stopPropagation();
            const info2 = getSketchInfoGlobal?.();
            if (info2?.actions?.setState) {
              info2.actions.setState(stateKey);
            } else if (info2?.actions?.nextState) {
              info2.actions.nextState();
            }
            resetTimerForState(stateKey);
            updateStateDisplay();
            renderControls();
          });
          
          const timerDisplay = document.createElement('div');
          timerDisplay.className = 'state-timer' + (isActive ? ' is-active' : '');
          timerDisplay.dataset.state = stateKey;
          const timerValue = isActive ? Math.max(0, Math.ceil(currentTimerValue)) : (stateTimerSettings[stateKey] || DEFAULT_TIMER);
          timerDisplay.textContent = formatTime(timerValue);
          
          timerDisplay.addEventListener('click', (e) => {
            e.stopPropagation();
            const input = document.createElement('input');
            input.type = 'number';
            input.value = stateTimerSettings[stateKey] || DEFAULT_TIMER;
            input.min = 1;
            input.className = 'timer-input';
            
            const originalValue = stateTimerSettings[stateKey] || DEFAULT_TIMER;
            
            timerDisplay.innerHTML = '';
            timerDisplay.appendChild(input);
            input.focus();
            input.select();
            
            let cancelled = false;
            
            const finishEdit = () => {
              if (cancelled) {
                timerDisplay.textContent = formatTime(originalValue);
                return;
              }
              const newValue = Math.max(1, parseInt(input.value) || DEFAULT_TIMER);
              stateTimerSettings[stateKey] = newValue;
              saveTimerSettings();
              if (stateKey === getSketchInfoGlobal?.().current) {
                currentTimerValue = newValue;
              }
              renderTimerDisplay();
            };
            
            input.addEventListener('blur', finishEdit, { once: true });
            input.addEventListener('keydown', (e) => {
              if (e.key === 'Enter') {
                finishEdit();
              } else if (e.key === 'Escape') {
                cancelled = true;
              }
            });
          });
          
          stateRow.appendChild(stateItem);
          stateRow.appendChild(timerDisplay);
          statesContainer.appendChild(stateRow);
        });
        
        renderControls();
        renderTimerDisplay();
      }
      
      loadTimerSettings();
      const initialInfo = getSketchInfoGlobal?.();
      timerTargetDuration = stateTimerSettings[initialInfo?.current] || DEFAULT_TIMER;
      timerStartTime = performance.now();
      currentTimerValue = timerTargetDuration;
      updateStateDisplayInner = updateStateDisplay;
      updateStateDisplay();
      if (timersEnabled) {
        startTimer();
      }
    }

    function createPaletteUI() {
      const container = document.createElement('div');
      container.id = 'palette-container';
      
      const panel = document.createElement('div');
      panel.id = 'palette-ui';
      
      const contentWrapper = document.createElement('div');
      contentWrapper.className = 'palette-content';
      
      const tab = document.createElement('div');
      tab.id = 'palette-tab';
      tab.innerHTML = ICONS.arrowRight;
      
      const colorsContainer = document.createElement('div');
      colorsContainer.className = 'palette-colors';
      
      let isFixed = false;
      
      function renderColors() {
        colorsContainer.innerHTML = '';
        
        paletteColors.forEach((color, index) => {
          const row = document.createElement('div');
          row.className = 'palette-row';
          
          const swatchWrapper = document.createElement('div');
          swatchWrapper.className = 'swatch-wrapper';
          swatchWrapper.style.background = color.value;
          
          const swatch = document.createElement('input');
          swatch.type = 'color';
          swatch.className = 'color-picker';
          swatch.value = color.value;
          swatch.addEventListener('input', (e) => {
            paletteColors[index].value = e.target.value;
            swatchWrapper.style.background = e.target.value;
            saveColorsToStorage();
          });
          
          swatchWrapper.appendChild(swatch);
          
          const nameInput = document.createElement('input');
          nameInput.type = 'text';
          nameInput.className = 'name-input';
          nameInput.value = color.name;
          nameInput.placeholder = 'color name';
          nameInput.addEventListener('input', (e) => {
            paletteColors[index].name = e.target.value;
            saveColorsToStorage();
          });
          
          const delBtn = document.createElement('button');
          delBtn.className = 'delete-btn';
          delBtn.innerHTML = '×';
          delBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            paletteColors.splice(index, 1);
            saveColorsToStorage();
            const p = getP5Instance?.();
            if (p) {
              p.colors = getColorsObject();
            }
            renderColors();
          });
          
          row.appendChild(swatchWrapper);
          row.appendChild(nameInput);
          row.appendChild(delBtn);
          colorsContainer.appendChild(row);
        });
      }
      
      function createAddButton() {
        const row = document.createElement('div');
        row.className = 'palette-add-row';
        
        const addIcon = document.createElement('div');
        addIcon.className = 'add-icon';
        addIcon.innerHTML = '+';
        addIcon.addEventListener('click', () => {
          paletteColors.push({ name: 'color' + paletteColors.length, value: getAccentColor() });
          saveColorsToStorage();
          const p = getP5Instance?.();
          if (p) {
            p.colors = getColorsObject();
          }
          renderColors();
        });
        
        const addText = document.createElement('span');
        addText.className = 'add-text';
        addText.textContent = 'add color';
        
        row.appendChild(addIcon);
        row.appendChild(addText);
        return row;
      }
      
      panel.appendChild(contentWrapper);
      contentWrapper.appendChild(colorsContainer);
      contentWrapper.appendChild(createAddButton());
      container.appendChild(panel);
      paletteContainer = container;
      paletteTab = tab;
      document.body.appendChild(container);
      document.body.appendChild(tab);
      
      renderColors();
      
      tab.addEventListener('mouseenter', () => {
        tab.classList.add('is-active');
        if (!isFixed) {
          panel.classList.add('is-visible');
        }
      });
      tab.addEventListener('mouseleave', () => {
        tab.classList.remove('is-active');
        if (!isFixed) {
          panel.classList.remove('is-visible');
        }
      });
      
      panel.addEventListener('mouseenter', () => {
        if (!isFixed) {
          panel.classList.add('is-visible');
        }
      });
      panel.addEventListener('mouseleave', () => {
        if (!isFixed) {
          panel.classList.remove('is-visible');
        }
      });
      
      tab.addEventListener('click', (e) => {
        e.stopPropagation();
        isFixed = !isFixed;
        
        if (isFixed) {
          panel.classList.add('is-fixed');
          tab.classList.add('is-active');
          tab.innerHTML = ICONS.arrowLeft;
        } else {
          panel.classList.remove('is-fixed');
          tab.classList.remove('is-active');
          tab.innerHTML = ICONS.arrowRight;
        }
      });
    }

    function updateStatus() {
      if (p5Instance && isPlaying) {
        statusFps.textContent = Math.round(p5Instance.frameRate());
        statusFrame.textContent = p5Instance.frameCount;
      }
      if (isPlaying) {
        elapsedTime += (p5Instance?.deltaTime || 16.67) / 1000;
      }
      const mins = Math.floor(elapsedTime / 60).toString().padStart(2, '0');
      const secs = Math.floor(elapsedTime % 60).toString().padStart(2, '0');
      statusTime.textContent = mins + ':' + secs;
      statusState.textContent = isPlaying ? 'playing' : 'paused';
      statusState.classList.toggle('is-playing', isPlaying);
    }

    function togglePlay() {
      isPlaying = !isPlaying;
      playIcon.textContent = isPlaying ? ICONS.pause : ICONS.play;
      
      if (isPlaying) {
        if (recordingArmed) {
          startRecording();
        }
        if (timersEnabled) {
          startTimer();
          renderTimerDisplay();
        }
      } else {
        stopTimer();
      }
      
      updateStatus();
    }

    function toggleRecord() {
      if (!isRecording) {
        if (isPlaying) {
          startRecording();
        } else {
          if (!recordingArmed) {
            recordingArmed = true;
            recordBtn.classList.add('armed');
            recordIcon.textContent = ICONS.recordArmed;
          } else {
            recordingArmed = false;
            recordBtn.classList.remove('armed');
            recordIcon.textContent = ICONS.record;
          }
        }
      } else {
        stopRecording();
      }
    }

    function startRecording() {
      const canvas = canvasContainer.querySelector('canvas');
      if (!canvas) return;
      
      const stream = canvas.captureStream(CAPTURE_FRAMERATE);
      recordedChunks = [];
      
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: VIDEO_BITRATE });
      
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
          recordedChunks.push(e.data);
        }
      };
      
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const sketchName = SKETCHES[currentSketchIndex]?.name || 'sketch';
        a.download = `${sketchName}_${Date.now()}.webm`;
        a.click();
        URL.revokeObjectURL(url);
      };
      
      mediaRecorder.start();
      isRecording = true;
      recordingArmed = false;
      recordBtn.classList.remove('armed');
      recordBtn.classList.add('recording');
      recordIcon.textContent = ICONS.stop;
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      isRecording = false;
      recordingArmed = false;
      recordBtn.classList.remove('recording');
      recordBtn.classList.remove('armed');
      recordIcon.textContent = ICONS.record;
    }

    playBtn.addEventListener('click', togglePlay);
    recordBtn.addEventListener('click', toggleRecord);
    reloadBtn.addEventListener('click', () => loadSketch(currentSketchIndex));
    exportBtn.addEventListener('click', exportColors);
    importBtn.addEventListener('click', () => importInput.click());
    
    const helpBtn = document.getElementById('btn-help');
    helpBtn.addEventListener('click', openHelpDialog);
    dialogClose.addEventListener('click', closeHelpDialog);
    dialogOverlay.addEventListener('click', (e) => {
      if (e.target === dialogOverlay) closeHelpDialog();
    });
    
    importInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        importColors(e.target.files[0]);
        e.target.value = '';
      }
    });
    
    selectEl.addEventListener('change', (e) => {
      loadSketch(parseInt(e.target.value));
    });

    loadSketch(0);
    updateStatus();
  </script>
</body>
</html>
